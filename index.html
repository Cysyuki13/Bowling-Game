<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="Bowling_Icon.png">
    <title>Street Bowling 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #05050a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            background: transparent;
            flex-direction: column;
            justify-content: space-between;
            color: white;
            padding: 15px;
            box-sizing: border-box;
            z-index: 1000;
        }

        #action-cam-container {
            pointer-events: auto !important;
            z-index: 100;
        }

        .top-ui {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-start;
            padding-right: 60px;
        }

        .score-board {
            background: rgba(20, 20, 40, 0.85);
            padding: 12px;
            border-radius: 12px;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            max-width: fit-content;
        }

        .history-table {
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            overflow: hidden;
            font-size: 12px;
            text-align: center;
            min-width: 240px;
        }

        .history-table th,
        .history-table td {
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 4px;
            width: 35px;
        }

        .history-table th {
            background: rgba(230, 126, 34, 0.3);
            color: #f39c12;
            text-transform: uppercase;
            font-size: 10px;
        }

        .total-col {
            background: rgba(46, 204, 113, 0.2);
            font-weight: bold;
            color: #2ecc71;
        }

        .instructions {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(231, 76, 60, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            pointer-events: none;
            border: 1px solid #e74c3c;
            width: 70%;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s ease;
        }

        .btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            pointer-events: auto;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, background 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:hover {
            background: #d35400;
        }

        #msg-box {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 25, 0.8);
            padding: 20px;
            border-radius: 24px;
            text-align: center;
            pointer-events: auto;
            display: none;
            width: 280px;
            border: 2px solid #e67e22;
            z-index: 1000;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        #strike-popup {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: clamp(40px, 15vw, 150px);
            font-weight: 900;
            color: #ffffff;
            text-shadow:
                0 0 10px #f1c40f,
                0 0 20px #f1c40f,
                0 0 40px #e67e22,
                0 0 70px #d35400,
                0 0 100px #ff0000;
            z-index: 5001;
            pointer-events: none;
            opacity: 0;
            font-style: italic;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        #strike-popup.show {
            display: block;
            opacity: 1;
            animation: strike-thump 0.5s ease-out forwards, strike-glow 0.8s ease-in-out infinite alternate;
        }

        .menu-container {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            pointer-events: auto;
        }

        .menu-icon-btn {
            background: rgba(20, 20, 40, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 24px;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .settings-popup {
            margin-top: 10px;
            background: rgba(15, 15, 25, 0.95);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #e67e22;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 160px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
        }

        .settings-popup label {
            font-size: 12px;
            font-weight: bold;
            color: #f1c40f;
            letter-spacing: 1px;
        }

        #volume-slider {
            width: 100%;
            cursor: pointer;
            accent-color: #e67e22;
        }

        #vol-percent {
            font-size: 14px;
            font-weight: bold;
        }

        .settings-btn {
            background: rgba(230, 126, 34, 0.2);
            color: white;
            border: 1px solid #e67e22;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            font-size: 12px;
            transition: background 0.2s;
        }

        .settings-btn:hover {
            background: rgba(230, 126, 34, 0.4);
        }

        #screen-dimmer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            z-index: 5000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #screen-dimmer.dimmed {
            opacity: 1;
        }

        #action-cam-container.enlarged {
            width: 90vw !important;
            height: 50vh !important;
            bottom: 50% !important;
            right: 50% !important;
            transform: translate(50%, 50%);
            z-index: 1100;
        }

        #watch-replay-btn {
            pointer-events: auto;
            display: none;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            font-size: 18px;
            background: rgba(255, 215, 0, 0.9);
            color: #000;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            z-index: 1100;
            transition: all 0.3s ease;
        }

        #watch-replay-btn:hover {
            background: #fff;
            transform: translateX(-50%) scale(1.1);
        }

        @media (max-width: 600px) {
            .score-board {
                padding: 8px;
                border-radius: 8px;
            }

            #score-text {
                font-size: 16px !important;
                margin-bottom: 4px !important;
            }

            .history-table {
                min-width: 180px;
                font-size: 10px;
            }

            .history-table th,
            .history-table td {
                padding: 4px 2px;
                width: 25px;
            }

            .menu-container {
                top: 10px !important;
                right: 10px !important;
            }

            .menu-icon-btn {
                font-size: 18px !important;
                padding: 8px !important;
            }

            .settings-popup {
                width: 140px;
                padding: 10px;
            }
        }

        @keyframes strike-thump {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        @keyframes strike-glow {
            from {
                text-shadow: 0 0 10px #fff, 0 0 20px #f1c40f;
            }

            to {
                text-shadow: 0 0 20px #fff, 0 0 40px #e67e22;
            }
        }
    </style>
</head>

<body>

    <div id="ui-overlay">
        <div id="action-cam-container" onclick="toggleActionCamSize(event)"
            style="cursor: pointer; position: absolute; bottom: 20px; right: 20px; width: 250px; height: 150px; border: 3px solid #e74c3c; border-radius: 10px; overflow: hidden; display: none; box-shadow: 0 0 20px rgba(231, 76, 60, 0.5); background: #000; pointer-events: auto !important;">
            <div
                style="position:absolute; top:5px; left:5px; color:#e74c3c; font-weight:bold; font-size:10px; z-index:10; pointer-events: none;">
                ACTION CAM (TAP TO ZOOM)
            </div>
            <canvas id="action-canvas" style="pointer-events: none;"></canvas>
        </div>

        <div class="menu-container" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()"
            ontouchmove="event.stopPropagation()">
            <button class="menu-icon-btn" onclick="toggleSettingsMenu()">⚙️</button>
            <div id="settings-menu" class="settings-popup">
                <h3 style="margin: 0 0 10px 0; font-size: 14px; color: #e67e22;">SETTINGS</h3>

                <label>VOLUME</label>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5"
                    oninput="updateVolume(this.value)">
                <div id="vol-percent">50%</div>

                <hr style="width: 100%; border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0;">

                <label>GAME MODE</label>
                <button id="mode-toggle-btn" class="settings-btn" onclick="toggleGameMode()">
                    10 PINS
                </button>
            </div>
        </div>

        <div class="top-ui">
            <div class="score-board">
                <div id="score-text" style="font-size: 20px; font-weight: bold; color: #f39c12; margin-bottom: 8px;">
                    Pins: 0
                </div>
                <table class="history-table" id="history-table">
                    <thead>
                        <tr>
                            <th>M1</th>
                            <th>M2</th>
                            <th>M3</th>
                            <th>M4</th>
                            <th>M5</th>
                            <th class="total-col">TOT</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td id="m0">-</td>
                            <td id="m1">-</td>
                            <td id="m2">-</td>
                            <td id="m3">-</td>
                            <td id="m4">-</td>
                            <td id="total-score" class="total-col">0</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="instructions" id="hint">
            Drag to Position &bull; Flick UP to Launch
        </div>

        <div id="strike-popup">STRIKE!</div>

        <div id="msg-box" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
            <h1 id="msg-title">STRIKE!</h1>
            <p id="msg-body">Explosive hit!</p>
            <button id="action-btn" class="btn" onclick="handleMatchEnd()">NEXT FRAME</button>
        </div>

        <button id="watch-replay-btn" class="btn" onclick="startReplay()"
            style="display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); pointer-events: auto;">
            WATCH REPLAY
        </button>

        <div id="screen-dimmer"></div>

    </div>

    <script>
        // --- CONSTANTS ---
        const LANE_Y = 0.1;
        const BALL_RADIUS = 0.35;
        const PIN_HEIGHT = 0.8;
        const TRAIL_MAX_POINTS = 60;
        const MAX_MATCHES = 5;

        // --- STATE ---
        let pins = [];
        let pinCircles = [];
        let targetPinCount = 10;
        let lastPinSoundTime = 0;

        let scene, camera, renderer, world, sunLight;
        let ballBody, ballMesh;
        let laneMesh;
        let groundBody;

        let isBowling = false;
        let isTouching = false;
        let touchStartPos = { x: 0, y: 0 };
        let touchStartTime = 0;
        let lastTouchX = 0;
        let impactParticles = [];
        let trailHistory = [];
        let trailMesh;
        let randomHookForce = 0;

        let matchHistory = [];
        let currentFallenPins = 0;

        let impactOccurred = false;
        let resetTimer = null;

        let timeScale = 1.0;
        let isCinematicMode = false;
        let cinematicTargetPin = null;

        let audioListener, audioLoader;
        let ballPathSound, pinKnockSound;
        let gameSounds = {};

        let actionCamera, actionRenderer, actionCanvas;
        let actionTargetPin = null;
        let lastTargetSwitchTime = 0;
        const SWITCH_COOLDOWN = 1000;

        const DECK_CENTER_Z = -22;

        let isReplaying = false;
        let replayData = [];
        let replayFrameIndex = 0;

        let cameraLookAtTarget = new THREE.Vector3(0, 1, 0);

        let touchPathLine, touchPathLine2, touchPathLine3;
        let outerGlowLine;
        let touchPathPoints = [];

        const groundMat = new CANNON.Material();
        const ballMat = new CANNON.Material();
        const pinMat = new CANNON.Material();

        let leftGutter, rightGutter;
        let leftWallJoint, rightWallJoint;

        let sounds = {};

        let leftWallMesh, rightWallMesh;
        let leftWallBody, rightWallBody;

        let currentPinVolume = 0.7;
        let lastPinHitTime = 0;

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010105);
            scene.fog = new THREE.FogExp2(0x010105, 0.03);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // 2. Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.4);
            scene.add(hemiLight);

            sunLight = new THREE.DirectionalLight(0xffffff, 3);
            sunLight.position.set(15, 35, -40);
            sunLight.intensity = 2.5;
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.left = -20;
            sunLight.shadow.camera.right = 20;
            sunLight.shadow.camera.top = 40;
            sunLight.shadow.camera.bottom = -40;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 100;
            sunLight.shadow.bias = -0.0005;
            scene.add(sunLight);

            // 3. UI Lines
            const pathMaterial = new THREE.LineBasicMaterial({
                color: 0x00ffff, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending
            });
            touchPathLine = new THREE.Line(new THREE.BufferGeometry(), pathMaterial);
            touchPathLine2 = new THREE.Line(new THREE.BufferGeometry(), pathMaterial);
            touchPathLine3 = new THREE.Line(new THREE.BufferGeometry(), pathMaterial);
            touchPathLine2.position.x += 0.02;
            touchPathLine3.position.x -= 0.02;
            scene.add(touchPathLine, touchPathLine2, touchPathLine3);

            const outerGlowMaterial = new THREE.LineBasicMaterial({
                color: 0x0088ff, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending
            });
            outerGlowLine = new THREE.Line(new THREE.BufferGeometry(), outerGlowMaterial);
            outerGlowLine.scale.set(1.02, 1, 1.02);
            scene.add(outerGlowLine);

            // 4. Street Lamps
            const streetLamp1 = new THREE.PointLight(0xffaa44, 1.5, 50);
            streetLamp1.position.set(10, 10, -15);
            scene.add(streetLamp1);

            const streetLamp2 = new THREE.PointLight(0x00ffff, 4, 40);
            streetLamp2.position.set(-5, 8, -30);
            scene.add(streetLamp2);

            // 5. AUDIO SETUP (Fixing the ReferenceError)
            audioListener = new THREE.AudioListener();
            camera.add(audioListener);
            audioLoader = new THREE.AudioLoader();

            // Ensure gameSounds object exists globally if you use it in resetGame
            if (typeof gameSounds === 'undefined') window.gameSounds = {};

            ballPathSound = new THREE.Audio(audioListener);
            audioLoader.load('bowling-ball-path.mp3', function (buffer) {
                ballPathSound.setBuffer(buffer);
                ballPathSound.setLoop(true);
                ballPathSound.setVolume(0.5);
                gameSounds['ball_roll'] = ballPathSound; // Storing in gameSounds for consistency
            });

            pinKnockSound = new THREE.Audio(audioListener);
            audioLoader.load('single-bowling-pin-knock.mp3', function (buffer) {
                pinKnockSound.setBuffer(buffer);
                pinKnockSound.setVolume(0.7);
                gameSounds['collision'] = pinKnockSound;
            });

            audioLoader.load('ui_sound.mp3', function (buffer) {
                const uiSound = new THREE.Audio(audioListener);
                uiSound.setBuffer(buffer);
                uiSound.setVolume(0.5);
                gameSounds['ui_click'] = uiSound;
            });

            // 6. PHYSICS SETUP (Bouncy Walls)
            world = new CANNON.World();
            world.gravity.set(0, -23, 0);

            // Export materials to global scope so other functions can use them
            window.ballMat = new CANNON.Material("ballMat");
            window.groundMat = new CANNON.Material("groundMat");
            window.pinMat = new CANNON.Material("pinMat");
            window.wallMat = new CANNON.Material("wallMat");

            const ballGroundContact = new CANNON.ContactMaterial(ballMat, groundMat, { friction: 0.2, restitution: 0.1 });
            const ballPinContact = new CANNON.ContactMaterial(ballMat, pinMat, {
                friction: 0.0,
                restitution: 0.5
            });
            const pinPinContact = new CANNON.ContactMaterial(pinMat, pinMat, { friction: 0.5, restitution: 0.2 });
            const pinGroundContact = new CANNON.ContactMaterial(pinMat, groundMat, { friction: 0.6, restitution: 0.1 });

            // Bouncy wall contact
            const ballWallContact = new CANNON.ContactMaterial(ballMat, wallMat, {
                friction: 0.1,
                restitution: 0.8, // High bounciness
                contactEquationStiffness: 1e8,
                contactEquationRelaxation: 3
            });

            world.addContactMaterial(ballGroundContact);
            world.addContactMaterial(ballPinContact);
            world.addContactMaterial(pinPinContact);
            world.addContactMaterial(pinGroundContact);
            world.addContactMaterial(ballWallContact);

            // 7. Action Camera Rendering
            actionCanvas = document.getElementById('action-canvas');
            actionCamera = new THREE.PerspectiveCamera(45, 250 / 150, 0.1, 100);
            actionRenderer = new THREE.WebGLRenderer({ canvas: actionCanvas, antialias: true });
            actionRenderer.setSize(250, 150);

            // 8. Object Initialization
            createStreetEnvironment();
            createBall();
            createPins();
            initLightTrail();

            // 9. Event Listeners
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('touchstart', onTouchStart, { passive: false });
            window.addEventListener('touchmove', onTouchMove, { passive: false });
            window.addEventListener('touchend', onTouchEnd, { passive: false });

            window.addEventListener('mousedown', (e) => onTouchStart({ touches: [{ clientX: e.clientX, clientY: e.clientY }], preventDefault: () => { } }));
            window.addEventListener('mousemove', (e) => { if (isTouching) onTouchMove({ touches: [{ clientX: e.clientX, clientY: e.clientY }], preventDefault: () => { } }); });
            window.addEventListener('mouseup', (e) => onTouchEnd({ changedTouches: [{ clientX: e.clientX, clientY: e.clientY }], preventDefault: () => { } }));

            // 10. Start
            resetGame();
            animate();
        }

        function toggleActionCamSize(event) {
            if (event) event.stopPropagation();
            playGameSound('ui_click');
            const container = document.getElementById('action-cam-container');
            container.classList.toggle('enlarged');

            setTimeout(() => {
                if (actionRenderer && actionCamera) {
                    const w = container.clientWidth;
                    const h = container.clientHeight;
                    actionRenderer.setSize(w, h);
                    actionCamera.aspect = w / h;
                    actionCamera.updateProjectionMatrix();
                }
            }, 50);
        }

        function toggleSettingsMenu() {
            playGameSound('ui_click');
            const menu = document.getElementById('settings-menu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        function toggleGameMode() {
            if (targetPinCount === 10) {
                targetPinCount = 100;
                document.getElementById('mode-toggle-btn').innerText = "100 PINS";
            } else {
                targetPinCount = 10;
                document.getElementById('mode-toggle-btn').innerText = "10 PINS";
            }

            updateLaneWidth();
            matchHistory = [];
            updateScoreTable();
            resetGame();
            playGameSound('ui_click');
        }

        function updateVolume(value) {
            const percent = Math.round(value * 100);
            document.getElementById('vol-percent').innerText = percent + "%";
            if (audioListener) {
                audioListener.setMasterVolume(value * 2);
            }
        }

        function updateLaneWidth() {
            const is100 = (targetPinCount === 100);

            // 1. Explicitly define the positions for each mode
            // 10 pins: lane is 4.5 wide, wall should be at 3.6
            // 100 pins: lane is 7.6 wide, wall should be at 4.4
            const laneWidth = is100 ? 7.6 : 4.5;
            const wallX = is100 ? 4.4 : 3.6;

            // 2. Scale the visual lane
            if (laneMesh) {
                laneMesh.scale.x = laneWidth / 4.5;
            }

            // 3. Update the Physics floor width
            if (groundBody) {
                const shape = groundBody.shapes[0];
                shape.halfExtents.x = laneWidth / 2;
                shape.updateConvexPolyhedronRepresentation();
                groundBody.updateBoundingRadius();
            }

            // 4. FIX: Handle Gutters
            if (leftGutter && rightGutter) {
                if (is100) {
                    leftGutter.visible = false;
                    rightGutter.visible = false;
                } else {
                    leftGutter.visible = true;
                    rightGutter.visible = true;
                    // Reset to exact original gutter positions
                    leftGutter.position.x = -2.5;
                    rightGutter.position.x = 2.5;
                }
            }

            // 5. FIX: Move Walls AND Wall Joints (Vertical Pillars)
            // We use an array to make sure everything moves together
            const leftSide = [leftWallMesh, leftWallBody, leftWallJoint];
            const rightSide = [rightWallMesh, rightWallBody, rightWallJoint];

            leftSide.forEach(obj => {
                if (obj) obj.position.x = -wallX;
            });

            rightSide.forEach(obj => {
                if (obj) obj.position.x = wallX;
            });
        }

        function triggerDimmer(show) {
            const dimmer = document.getElementById('screen-dimmer');
            if (!dimmer) return;
            if (show) dimmer.classList.add('dimmed');
            else dimmer.classList.remove('dimmed');
        }

        function createStreetEnvironment() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#e3c18d';
            ctx.fillRect(0, 0, 512, 1024);

            const plankCount = 39;
            const plankWidth = 512 / plankCount;

            for (let i = 0; i < plankCount; i++) {
                ctx.fillStyle = `rgba(139, 69, 19, ${Math.random() * 0.1})`;
                ctx.fillRect(i * plankWidth, 0, plankWidth, 1024);
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(i * plankWidth, 0);
                ctx.lineTo(i * plankWidth, 1024);
                ctx.stroke();
            }

            const laneTexture = new THREE.CanvasTexture(canvas);
            laneTexture.wrapS = THREE.RepeatWrapping;
            laneTexture.wrapT = THREE.RepeatWrapping;
            laneTexture.repeat.set(1, 10);

            const laneGeo = new THREE.BoxGeometry(4.5, 0.2, 100);
            const laneMat = new THREE.MeshStandardMaterial({
                map: laneTexture,
                roughness: 0.9,
                metalness: 0.7,
                color: 0x444444
            });

            laneMesh = new THREE.Mesh(laneGeo, laneMat);
            laneMesh.position.set(0, 0, -35);
            laneMesh.receiveShadow = true;
            scene.add(laneMesh);

            // --- GUTTER CREATION ---
            const gutterGeo = new THREE.BoxGeometry(0.5, 0.2, 100);
            const gutterMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a });

            leftGutter = new THREE.Mesh(gutterGeo, gutterMat);
            leftGutter.position.set(-2.5, -0.05, -35);
            scene.add(leftGutter);

            rightGutter = new THREE.Mesh(gutterGeo, gutterMat.clone());
            rightGutter.position.set(2.5, -0.05, -35);
            scene.add(rightGutter);

            // --- VISUAL WALLS ---
            const wallGeo = new THREE.BoxGeometry(1.2, 18, 100);
            const wallVisualMat = new THREE.MeshStandardMaterial({ color: 0x0d0d0d });

            const wallDist = 3.6;

            leftWallMesh = new THREE.Mesh(wallGeo, wallVisualMat);
            leftWallMesh.position.set(-wallDist, 9, -35);
            scene.add(leftWallMesh);

            rightWallMesh = new THREE.Mesh(wallGeo, wallVisualMat.clone());
            rightWallMesh.position.set(wallDist, 9, -35);
            scene.add(rightWallMesh);

            // --- PHYSICS BODIES ---

            // 1. Ground (Still uses groundMat - not bouncy)
            const groundShape = new CANNON.Box(new CANNON.Vec3(2.25, 0.1, 50));
            groundBody = new CANNON.Body({ mass: 0, material: groundMat });
            groundBody.addShape(groundShape);
            groundBody.position.set(0, 0, -35);
            world.addBody(groundBody);

            // 2. Bouncy Walls (Updated to use wallMat)
            const physicsWallShape = new CANNON.Box(new CANNON.Vec3(0.6, 9, 50));

            // Left Wall
            leftWallBody = new CANNON.Body({
                mass: 0,
                material: typeof wallMat !== 'undefined' ? wallMat : groundMat
            });
            leftWallBody.addShape(physicsWallShape);
            leftWallBody.position.set(-wallDist, 9, -35);
            world.addBody(leftWallBody);

            // Right Wall
            rightWallBody = new CANNON.Body({
                mass: 0,
                material: typeof wallMat !== 'undefined' ? wallMat : groundMat
            });
            rightWallBody.addShape(physicsWallShape);
            rightWallBody.position.set(wallDist, 9, -35);
            world.addBody(rightWallBody);
        }



        function createBall() {
            ballMesh = new THREE.Mesh(
                new THREE.SphereGeometry(BALL_RADIUS, 32, 32),
                new THREE.MeshPhongMaterial({ color: 0x00eeff, shininess: 250, emissive: 0x003366 })
            );
            ballMesh.castShadow = true;
            scene.add(ballMesh);

            const ballShape = new CANNON.Sphere(BALL_RADIUS);
            ballBody = new CANNON.Body({ mass: 0, shape: ballShape, material: ballMat });

            ballBody.type = CANNON.Body.STATIC;
            ballBody.mass = 0;
            ballBody.updateMassProperties();
            ballBody.linearDamping = 0.1;
            ballBody.angularDamping = 0.1;

            const startPos = new CANNON.Vec3(0, LANE_Y + BALL_RADIUS + 0.05, 6);
            ballBody.position.copy(startPos);
            world.addBody(ballBody);
            ballMesh.position.copy(ballBody.position);
        }

        function createPinGeometry() {
            const points = [];
            points.push(new THREE.Vector2(0, -0.4));
            points.push(new THREE.Vector2(0.12, -0.4));
            points.push(new THREE.Vector2(0.16, -0.25));
            points.push(new THREE.Vector2(0.15, -0.15));
            points.push(new THREE.Vector2(0.08, 0.08));
            points.push(new THREE.Vector2(0.06, 0.22));
            points.push(new THREE.Vector2(0.09, 0.32));
            points.push(new THREE.Vector2(0.07, 0.38));
            points.push(new THREE.Vector2(0, 0.4));
            return new THREE.LatheGeometry(points, 24);
        }

        function createPins() {
            const pinGeo = createPinGeometry();
            const pinMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 200 });
            const stripeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const stripeGeo = new THREE.CylinderGeometry(0.07, 0.07, 0.03, 16);

            const SCORE_RADIUS = 0.22;
            const circleGeo = new THREE.RingGeometry(SCORE_RADIUS - 0.05, SCORE_RADIUS, 32);
            const circleMat = new THREE.MeshLambertMaterial({
                color: 0xffffff,      // Pure white base
                emissive: 0x00ffff,   // Neon Cyan glow (contrast well with green)
                emissiveIntensity: 0.5,
                transparent: true,
                opacity: 0.6
            });

            const spawnSinglePin = (x, z) => {
                const circle = new THREE.Mesh(circleGeo, circleMat.clone());
                circle.rotation.x = -Math.PI / 2;
                circle.position.set(x, LANE_Y + 0.01, z);
                scene.add(circle);
                pinCircles.push(circle);

                const group = new THREE.Group();

                // 1. MAIN PIN MESH
                const pMesh = new THREE.Mesh(pinGeo, pinMaterial);
                pMesh.castShadow = true;
                group.add(pMesh);

                // 2. OUTLINE EFFECT MESH
                // We create a slightly larger version of the pin geometry 
                // and render only the back side in black.
                const outlineMaterial = new THREE.MeshBasicMaterial({
                    color: 0x000000,
                    side: THREE.BackSide
                });
                const outlineMesh = new THREE.Mesh(pinGeo, outlineMaterial);
                // Adjust this scale (1.07) to make the outline thicker or thinner
                outlineMesh.scale.setScalar(1.07);
                group.add(outlineMesh);

                // 3. PIN STRIPE
                const stripe = new THREE.Mesh(stripeGeo, stripeMat);
                stripe.position.set(0, 0.16, 0);
                group.add(stripe);

                scene.add(group);

                // Physics setup (remains the same)
                const pBody = new CANNON.Body({ mass: 2.5, material: pinMat });
                const qCyl = new CANNON.Quaternion();
                qCyl.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);

                pBody.addShape(new CANNON.Cylinder(0.12, 0.12, 0.1, 12), new CANNON.Vec3(0, -0.35, 0), qCyl);
                pBody.addShape(new CANNON.Sphere(0.16), new CANNON.Vec3(0, -0.18, 0));
                pBody.addShape(new CANNON.Cylinder(0.08, 0.13, 0.3, 12), new CANNON.Vec3(0, 0.05, 0), qCyl);
                pBody.addShape(new CANNON.Sphere(0.09), new CANNON.Vec3(0, 0.31, 0));

                pBody.linearDamping = targetPinCount > 50 ? 0.45 : 0.2;
                pBody.angularDamping = targetPinCount > 50 ? 0.5 : 0.3;
                pBody.type = CANNON.Body.KINEMATIC;
                pBody.position.set(x, LANE_Y + (PIN_HEIGHT / 2), z);

                pBody.addEventListener('collide', (e) => {
                    if (pBody.type === CANNON.Body.KINEMATIC) {
                        pBody.type = CANNON.Body.DYNAMIC;
                        pBody.updateMassProperties();

                        const now = performance.now();

                        // Volume Decay Logic
                        // If the last hit was more than 1 second ago, reset volume
                        if (now - lastPinHitTime > 1000) {
                            currentPinVolume = 0.7;
                        } else {
                            // Decrease volume by 0.05 per hit, but cap at 0.175 (25% of 0.7)
                            currentPinVolume = Math.max(0.07, currentPinVolume - 0.05);
                        }
                        lastPinHitTime = now;

                        if (now - lastPinSoundTime > 80) {
                            if (pinKnockSound && pinKnockSound.buffer) {
                                if (pinKnockSound.isPlaying) pinKnockSound.stop();

                                // Apply the calculated dynamic volume
                                pinKnockSound.setVolume(currentPinVolume);
                                pinKnockSound.play();
                            }
                            lastPinSoundTime = now;
                        }

                        // Physics impulse logic remains the same...
                        const forceDir = pBody.position.vsub(e.contact.bi.position);
                        forceDir.normalize();
                        pBody.applyImpulse(forceDir.scale(2), pBody.position);
                        pBody.velocity.y += 1.2;

                        spawnImpact(pBody.position, 0xffffff, 8);

                        // Cinematic/Reset logic remains the same...
                        if (!impactOccurred) {
                            impactOccurred = true;
                            isCinematicMode = true;
                            timeScale = 0.15;
                            cinematicTargetPin = pBody;

                            setTimeout(() => {
                                timeScale = 1.0;
                                isCinematicMode = false;
                            }, 3000);

                            clearTimeout(resetTimer);
                            resetTimer = setTimeout(checkPins, 3500);
                        }
                    }
                });

                world.addBody(pBody);
                pins.push({ mesh: group, body: pBody, initialPos: { x: x, z: z } });
            };

            if (targetPinCount === 100) {
                const spacing = 0.52;
                const startZ = -22;
                for (let r = 0; r < 13; r++) {
                    for (let i = 0; i <= r; i++) {
                        const x = (i - r * 0.5) * spacing;
                        const z = startZ - (r * spacing);
                        spawnSinglePin(x, z);
                    }
                }
                const row14Count = 9;
                const r = 13;
                for (let i = 0; i < row14Count; i++) {
                    const x = (i - (row14Count - 1) * 0.5) * spacing;
                    const z = startZ - (r * spacing);
                    spawnSinglePin(x, z);
                }
            } else {
                const spacing = 0.65;
                const startZ = -22;
                for (let r = 0; r < 4; r++) {
                    for (let i = 0; i <= r; i++) {
                        const x = (i - r * 0.5) * spacing;
                        const z = startZ - (r * spacing);
                        spawnSinglePin(x, z);
                    }
                }
            }
        }

        function initLightTrail() {
            const geometry = new THREE.PlaneGeometry(1, 1, 1, TRAIL_MAX_POINTS - 1);
            const material = new THREE.MeshBasicMaterial({
                color: 0x00ccff, transparent: true, opacity: 0.6, side: THREE.DoubleSide, blending: THREE.AdditiveBlending
            });
            trailMesh = new THREE.Mesh(geometry, material);
            trailMesh.frustumCulled = false;
            trailMesh.visible = false;
            scene.add(trailMesh);
        }

        function updateLightTrail() {
            if (!isBowling) {
                trailMesh.visible = false;
                trailHistory = [];
                return;
            }
            trailMesh.visible = true;
            trailHistory.push({ x: ballBody.position.x, y: ballBody.position.y, z: ballBody.position.z });

            if (trailHistory.length > TRAIL_MAX_POINTS) trailHistory.shift();
            const posAttr = trailMesh.geometry.attributes.position;
            const baseWidth = 0.12;
            for (let i = 0; i < TRAIL_MAX_POINTS; i++) {
                const pointIndex = Math.min(i, trailHistory.length - 1);
                const point = trailHistory[pointIndex] || { x: ballBody.position.x, y: ballBody.position.y, z: ballBody.position.z };
                const taper = (i / TRAIL_MAX_POINTS);
                const currentWidth = baseWidth * taper;
                const trailY = point.y - BALL_RADIUS + 0.02;
                posAttr.setXYZ(i * 2, point.x - currentWidth / 2, trailY, point.z);
                posAttr.setXYZ(i * 2 + 1, point.x + currentWidth / 2, trailY, point.z);
            }
            posAttr.needsUpdate = true;
        }

        function spawnImpact(pos, color, count, scale = 1.0) {
            for (let i = 0; i < count; i++) {
                const part = new THREE.Mesh(
                    new THREE.SphereGeometry(0.04 * scale, 4, 4),
                    new THREE.MeshBasicMaterial({ color: color, transparent: true })
                );
                part.position.set(pos.x, pos.y, pos.z);
                const vx = (Math.random() - 0.5) * 0.1 * scale;
                const vy = Math.random() * 0.3 * scale;
                const vz = (Math.random() - 0.5) * 0.1 * scale;
                scene.add(part);
                impactParticles.push({ mesh: part, vel: new THREE.Vector3(vx, vy, vz), life: 1.0 });
            }
        }

        function updateImpacts() {
            for (let i = impactParticles.length - 1; i >= 0; i--) {
                const p = impactParticles[i];
                p.mesh.position.add(p.vel);
                p.vel.y -= 0.01; p.life -= 0.03;
                p.mesh.scale.setScalar(p.life);
                p.mesh.material.opacity = p.life;
                if (p.life <= 0) { scene.remove(p.mesh); impactParticles.splice(i, 1); }
            }
        }

        function onTouchStart(e) {
            if (isBowling) return;
            e.preventDefault();
            isTouching = true;

            touchPathPoints = [];
            touchPathLine.geometry.setFromPoints([new THREE.Vector3(0, 0, 0)]);

            document.getElementById('hint').style.opacity = '0';
            const t = (e.touches && e.touches[0]) || e;
            touchStartPos.x = t.clientX;
            touchStartPos.y = t.clientY;
            lastTouchX = t.clientX;
            touchStartTime = Date.now();
            ballMesh.material.emissive.setHex(0x00ffff);
        }

        function onTouchMove(e) {
            if (isBowling || !isTouching) return;
            const t = (e.touches && e.touches[0]) || e;

            const deltaX_Movement = (t.clientX - lastTouchX) * 0.015;

            const movementLimit = (targetPinCount === 100) ? 3.0 : 1.5;
            ballBody.position.x = Math.max(-movementLimit, Math.min(movementLimit, ballBody.position.x + deltaX_Movement));
            lastTouchX = t.clientX;

            let vector = new THREE.Vector3(
                (t.clientX / window.innerWidth) * 2 - 1,
                -(t.clientY / window.innerHeight) * 2 + 1,
                0.5
            );
            vector.unproject(camera);
            let dir = vector.sub(camera.position).normalize();
            let distance = -(camera.position.y - 0.15) / dir.y;
            let pos = camera.position.clone().add(dir.multiplyScalar(distance));

            const MAX_PATH_POINTS = 100;
            touchPathLine.geometry.setFromPoints(touchPathPoints);
            touchPathLine2.geometry.setFromPoints(touchPathPoints);
            touchPathLine3.geometry.setFromPoints(touchPathPoints);
            touchPathPoints.push(pos);
            if (touchPathPoints.length > MAX_PATH_POINTS) touchPathPoints.shift();

            touchPathLine.geometry.setFromPoints(touchPathPoints);
            if (outerGlowLine) outerGlowLine.geometry.setFromPoints(touchPathPoints);
        }

        function onTouchEnd(e) {
            if (isBowling || !isTouching) return;
            e.preventDefault();
            isTouching = false;

            const t = (e.changedTouches && e.changedTouches[0]) || e;
            const deltaX = t.clientX - touchStartPos.x;
            const deltaY = touchStartPos.y - t.clientY;
            const duration = Date.now() - touchStartTime;

            ballMesh.material.emissive.setHex(0x003366);

            if (deltaY > 20) {
                let speedScale = (deltaY / Math.max(duration, 5)) * 25;
                let forwardSpeed = Math.max(25, Math.min(speedScale, 65));
                let sideSpeed = deltaX * 0.05;
                randomHookForce = (Math.random() - 0.5) * 5;
                throwBall(forwardSpeed, sideSpeed);
            } else {
                document.getElementById('hint').style.opacity = '1';
            }

            touchPathPoints = [];
            touchPathLine.geometry.setFromPoints([new THREE.Vector3(0, 0, 0)]);
        }

        function throwBall(speed, sideSpeed = 0) {
            isBowling = true;
            document.getElementById('hint').style.opacity = '0';

            ballBody.mass = 500; // ball mass
            ballBody.type = CANNON.Body.DYNAMIC;
            ballBody.updateMassProperties();

            ballBody.velocity.set(sideSpeed, 0, -speed * 0.9);
            ballBody.angularVelocity.set(speed * 0.8, randomHookForce * 2, (Math.random() - 0.5) * 15);

            resetTimer = setTimeout(checkPins, 4000);
            playGameSound('rolling');
        }

        function checkPins() {
            let fallen = 0;
            const totalPinsInPlay = pins.length;
            const SCORE_RADIUS = 0.22;

            pins.forEach((p, index) => {
                const dx = p.body.position.x - p.initialPos.x;
                const dz = p.body.position.z - p.initialPos.z;
                const distance = Math.sqrt(dx * dx + dz * dz);
                const up = new CANNON.Vec3(0, 1, 0);
                const pinUp = p.body.quaternion.vmult(up);
                const angle = Math.acos(up.dot(pinUp));

                if (distance > SCORE_RADIUS || angle > 0.78 || p.body.position.y < -0.5) {
                    fallen++;
                    if (pinCircles[index]) pinCircles[index].material.color.setHex(0x2ecc71);
                } else {
                    if (pinCircles[index]) pinCircles[index].material.color.setHex(0xe74c3c);
                }
            });

            playGameSound('stop_rolling');

            currentFallenPins = fallen;
            document.getElementById('score-text').innerText = `Pins: ${fallen} / ${totalPinsInPlay}`;

            // --- Score Logic ---
            let scoreToRecord = fallen;
            const lastIndex = matchHistory.length - 1;
            if (fallen === totalPinsInPlay) {
                let consecutiveStrikes = 1;
                for (let i = lastIndex; i >= 0; i--) {
                    if (matchHistory[i] >= totalPinsInPlay) consecutiveStrikes++;
                    else break;
                }
                scoreToRecord = totalPinsInPlay * consecutiveStrikes;
            }
            matchHistory.push(scoreToRecord);
            updateScoreTable();

            // --- UI and Animation Logic ---
            const msgBox = document.getElementById('msg-box');
            const replayBtn = document.getElementById('watch-replay-btn');
            const title = document.getElementById('msg-title');
            const body = document.getElementById('msg-body');
            const btn = document.getElementById('action-btn');

            if (fallen === totalPinsInPlay) {
                // Strike Effects
                pins.forEach(p => {
                    const blastForce = 15;
                    const direction = p.body.position.clone().vsub(new CANNON.Vec3(0, 0, -22));
                    direction.normalize();
                    p.body.applyImpulse(direction.scale(blastForce), p.body.position);
                });

                const strikePopup = document.getElementById('strike-popup');
                strikePopup.classList.add('show');
                triggerDimmer(true);
                spawnImpact(new CANNON.Vec3(0, 1, -22), 0xf1c40f, 60, 4.0);

                // DELAY the menu so the popup is visible
                setTimeout(() => {
                    strikePopup.classList.remove('show');
                    triggerDimmer(false);
                    showResultMenu();
                }, 2000);
            } else {
                // Show immediately if not a strike
                showResultMenu();
            }

            // Helper function to handle the menu display
            function showResultMenu() {
                msgBox.style.display = 'block';
                replayBtn.style.display = 'block';

                if (matchHistory.length >= MAX_MATCHES) {
                    title.innerText = "FINAL SCORE";
                    let total = matchHistory.reduce((a, b) => a + b, 0);
                    body.innerText = `You hit ${fallen} pins this turn.\nTotal Score: ${total}`;
                    btn.innerText = "RESTART GAME";
                } else {
                    title.innerText = (fallen === totalPinsInPlay) ? "STRIKE!" : "RESULT";
                    body.innerText = `${fallen} / ${totalPinsInPlay} pins cleared.`;
                    btn.innerText = "NEXT FRAME";
                }
            }
        }

        function handleMatchEnd() {
            if (matchHistory.length >= MAX_MATCHES) {
                fullReset();
            } else {
                recordAndReset();
            }
        }

        function recordAndReset() {
            resetGame();
        }

        function startReplay() {
            if (replayData.length === 0) return;
            playGameSound('ui_click');

            isReplaying = true;
            replayFrameIndex = 0;

            // UI Changes
            document.getElementById('msg-box').style.display = 'none';

            // Change the button text and move it out of the msg-box if needed, 
            // or ensure it stays visible to allow canceling.
            const replayBtn = document.getElementById('watch-replay-btn');
            replayBtn.innerText = "CANCEL REPLAY";
            replayBtn.onclick = stopReplay; // Change the click function to stop
        }

        function stopReplay() {
            isReplaying = false;
            playGameSound('ui_click');

            // UI Reset
            document.getElementById('msg-box').style.display = 'block';

            const replayBtn = document.getElementById('watch-replay-btn');
            replayBtn.innerText = "WATCH REPLAY";
            replayBtn.onclick = startReplay; // Change the click function back to start

            // Reset camera to the main position so it doesn't stay stuck in Action Cam mode
            camera.position.set(0, 5, 30);
            camera.lookAt(0, 0, 0);
        }

        function fullReset() {
            matchHistory = [];
            updateScoreTable();
            resetGame();
        }

        function updateScoreTable() {
            let total = 0;
            for (let i = 0; i < MAX_MATCHES; i++) {
                const cell = document.getElementById(`m${i}`);
                if (matchHistory[i] !== undefined) {
                    cell.innerText = matchHistory[i];
                    total += matchHistory[i];

                    if (matchHistory[i] > 0 && matchHistory[i] % targetPinCount === 0) {
                        const streakCount = matchHistory[i] / targetPinCount;
                        if (streakCount > 1) {
                            cell.style.color = "#e74c3c";
                            cell.innerText = `${matchHistory[i]} (${streakCount}x)`;
                        } else {
                            cell.style.color = "#f1c40f";
                            cell.innerText = `${matchHistory[i]}`;
                        }
                    } else {
                        cell.style.color = "white";
                    }
                } else {
                    cell.innerText = "-";
                    cell.style.color = "white";
                }
            }
            document.getElementById('total-score').innerText = total;
        }

        function resetGame() {
            isBowling = false;
            randomHookForce = 0;
            currentFallenPins = 0;
            impactOccurred = false;
            isCinematicMode = false;
            cinematicTargetPin = null;
            timeScale = 1.0;

            replayData = [];
            isReplaying = false;

            touchPathPoints = [];
            const clearPoint = [new THREE.Vector3(0, 0, 0)];
            [touchPathLine, touchPathLine2, touchPathLine3, outerGlowLine].forEach(line => {
                if (line && line.geometry) {
                    line.geometry.setFromPoints(clearPoint);
                    line.geometry.attributes.position.needsUpdate = true;
                }
            });

            actionTargetPin = null;
            lastTargetSwitchTime = 0;

            camera.position.set(0, 4, 12);
            camera.lookAt(0, 1, -5);

            if (resetTimer) clearTimeout(resetTimer);
            resetTimer = null;

            triggerDimmer(false);

            const strikePopup = document.getElementById('strike-popup');
            if (strikePopup) strikePopup.classList.remove('show');

            document.getElementById('score-text').innerText = `Pins: 0`;
            document.getElementById('msg-box').style.display = 'none';
            document.getElementById('hint').style.opacity = '1';
            document.getElementById('watch-replay-btn').style.display = 'none';

            ballBody.type = CANNON.Body.STATIC;
            ballBody.mass = 0;
            ballBody.updateMassProperties();
            ballBody.velocity.set(0, 0, 0);
            ballBody.angularVelocity.set(0, 0, 0);
            ballBody.force.set(0, 0, 0);
            ballBody.torque.set(0, 0, 0);
            ballBody.position.set(0, LANE_Y + BALL_RADIUS + 0.05, 5);
            ballBody.quaternion.set(0, 0, 0, 1);

            ballMesh.position.copy(ballBody.position);
            ballMesh.quaternion.copy(ballBody.quaternion);

            trailHistory = [];
            if (trailMesh) trailMesh.visible = false;

            pins.forEach(p => {
                scene.remove(p.mesh);
                world.remove(p.body);
            });
            pins = [];

            pinCircles.forEach(circle => {
                scene.remove(circle);
            });
            pinCircles = [];

            createPins();

            playGameSound('stop_rolling');

            if (leftWallMesh) leftWallMesh.visible = true;
            if (rightWallMesh) rightWallMesh.visible = true;

            document.getElementById('action-cam-container').style.display = 'none';
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playGameSound(soundName) {
            const sound = sounds[soundName];
            if (sound && sound.buffer) {
                // Check if context is suspended and try to resume
                if (sound.context.state === 'suspended') {
                    sound.context.resume().then(() => {
                        if (!sound.isPlaying) sound.play();
                    });
                } else {
                    if (sound.isPlaying) sound.stop();
                    sound.play();
                }
            }
        }

        function unlockAudio() {
            if (THREE.AudioContext.getContext().state === 'suspended') {
                THREE.AudioContext.getContext().resume();
            }
            // Optional: Remove the listener once unlocked to save resources
            window.removeEventListener('click', unlockAudio);
            window.removeEventListener('touchstart', unlockAudio);
        }

        // Add listeners for the first interaction
        window.addEventListener('click', unlockAudio);
        window.addEventListener('touchstart', unlockAudio);

        function updateActionCam() {
            if (!isBowling) {
                document.getElementById('action-cam-container').style.display = 'none';
                actionTargetPin = null;
                return;
            }

            document.getElementById('action-cam-container').style.display = 'block';
            const currentTime = performance.now();

            if (!impactOccurred) {
                const ballPos = ballMesh.position;
                actionCamera.position.lerp(new THREE.Vector3(ballPos.x + 1.2, 0.6, ballPos.z + 3), 0.1);
                actionCamera.lookAt(ballPos.x, 0.4, ballPos.z - 2);
            } else {
                let bestPin = null;
                let highestPriority = -1;
                const is100 = (targetPinCount === 100);
                const gutterLimit = is100 ? 3.8 : 2.25;

                // 1. Find the best MOVING pin that is still ON the lane
                pins.forEach(p => {
                    const v = p.body.velocity.length();
                    // Height check (y > 0.1) and Gutter check (abs x < limit)
                    const isOnLane = p.body.position.y > 0.1 && Math.abs(p.body.position.x) < gutterLimit;

                    if (isOnLane && v > 0.8) { // Lowered velocity threshold slightly for smoother tracking
                        const distFromCenter = Math.sqrt(
                            Math.pow(p.body.position.x, 2) + Math.pow(p.body.position.z - DECK_CENTER_Z, 2)
                        );
                        const priority = v / (distFromCenter + 1);
                        if (priority > highestPriority) {
                            highestPriority = priority;
                            bestPin = p;
                        }
                    }
                });

                // 2. Immediate Void Check for the CURRENT target
                // If the pin we are currently watching falls, null it out so we can switch immediately
                if (actionTargetPin) {
                    const targetIsFallen = actionTargetPin.body.position.y < 0.1 ||
                        Math.abs(actionTargetPin.body.position.x) > gutterLimit;
                    if (targetIsFallen) {
                        actionTargetPin = null;
                    }
                }

                // 3. Switch Logic (Bypass cooldown if current target is gone)
                if (!actionTargetPin || (currentTime - lastTargetSwitchTime > SWITCH_COOLDOWN)) {
                    if (bestPin && bestPin !== actionTargetPin) {
                        actionTargetPin = bestPin;
                        lastTargetSwitchTime = currentTime;
                    }
                }

                // 4. Final Render Check
                if (actionTargetPin) {
                    const offsetX = is100 ? 3.2 : 1.8;
                    const offsetY = is100 ? 2.5 : 1.3;
                    const offsetZ = is100 ? 5.5 : 2.5;

                    let targetX = actionTargetPin.mesh.position.x + offsetX;
                    const targetY = offsetY;
                    const targetZ = actionTargetPin.mesh.position.z + offsetZ;

                    const currentLaneWidth = is100 ? 7.6 : 4.5;
                    const safetyMargin = 0.8;
                    const maxX = (currentLaneWidth / 2) - safetyMargin;

                    targetX = Math.max(-maxX, Math.min(maxX, targetX));

                    const targetCamPos = new THREE.Vector3(targetX, targetY, targetZ);
                    actionCamera.position.lerp(targetCamPos, 0.04);
                    actionCamera.lookAt(actionTargetPin.mesh.position);
                } else {
                    // FALLBACK: If no pins are moving on the lane, look at the deck center
                    const fallbackPos = new THREE.Vector3(0, is100 ? 4 : 2, DECK_CENTER_Z + 5);
                    actionCamera.position.lerp(fallbackPos, 0.02);
                    actionCamera.lookAt(0, 0, DECK_CENTER_Z);
                }
            }
            actionRenderer.render(scene, actionCamera);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Only step the physics world if we are NOT replaying
            if (!isReplaying) {
                world.step(1 / 60 * (typeof timeScale !== 'undefined' ? timeScale : 1));
            }

            if (ballMesh && ballBody) {
                if (!isReplaying) {
                    // --- LIVE PHYSICS MODE ---
                    ballMesh.position.copy(ballBody.position);
                    ballMesh.quaternion.copy(ballBody.quaternion);

                    // Plough-through logic for 100 pins
                    if (isBowling && ballBody.position.z < -15 && ballBody.position.z > -60) {
                        if (ballBody.velocity.z > -10) {
                            ballBody.velocity.z = -15;
                        }
                        ballBody.velocity.x *= 0.99;
                    }

                    pins.forEach(p => {
                        // Remove pins that fall deep into the void
                        if (p.body.position.y < -5.0 && p.body.type !== CANNON.Body.STATIC) {
                            p.body.velocity.set(0, 0, 0);
                            p.body.angularVelocity.set(0, 0, 0);
                            p.body.type = CANNON.Body.STATIC;
                        }
                        p.mesh.position.copy(p.body.position);
                        p.mesh.quaternion.copy(p.body.quaternion);
                    });

                    // RECORDING LOGIC: Increased limit to 900 for longer duration
                    if (isBowling && replayData.length < 900) {
                        replayData.push({
                            ball: { pos: ballBody.position.clone(), quat: ballBody.quaternion.clone() },
                            pins: pins.map(p => ({
                                pos: p.body.position.clone(),
                                quat: p.body.quaternion.clone()
                            }))
                        });
                    }

                    // Sound Logic
                    if (isBowling && typeof ballPathSound !== 'undefined' && ballPathSound && ballPathSound.buffer) {
                        const { x, y, z } = ballBody.position;
                        const currentHalfX = groundBody ? groundBody.shapes[0].halfExtents.x : 2.25;
                        const isOnLane = Math.abs(x) < currentHalfX;
                        const isTouchingFloor = y < 0.8 && y > 0.05;
                        const isBeforeBackDrop = z > -65;
                        const isMoving = ballBody.velocity.length() > 0.15;

                        if (isOnLane && isTouchingFloor && isBeforeBackDrop && isMoving && !impactOccurred) {
                            if (!ballPathSound.isPlaying) {
                                if (ballPathSound.context.state === 'suspended') ballPathSound.context.resume();
                                ballPathSound.play();
                            }
                        } else if (ballPathSound.isPlaying) {
                            ballPathSound.pause();
                        }
                    }
                } else {
                    // --- REPLAY PLAYBACK MODE ---
                    if (replayFrameIndex < replayData.length) {
                        const frame = replayData[replayFrameIndex];
                        ballMesh.position.copy(frame.ball.pos);
                        ballMesh.quaternion.copy(frame.ball.quat);
                        pins.forEach((p, i) => {
                            if (frame.pins[i]) {
                                p.mesh.position.copy(frame.pins[i].pos);
                                p.mesh.quaternion.copy(frame.pins[i].quat);
                            }
                        });
                        replayFrameIndex++;
                    } else {
                        // Auto-stop when frames run out
                        stopReplay();
                    }
                }
            }

            // --- CAMERA LOGIC (Handles both Live and Replay) ---
            if (isBowling || isReplaying) {
                const isPortrait = window.innerHeight > window.innerWidth;
                const pinAreaZ = -22;
                const is100 = (targetPinCount === 100);

                let desiredPosition = new THREE.Vector3();
                let desiredLookAt = new THREE.Vector3();

                if (isCinematicMode) {
                    const yOffset = is100 ? (isPortrait ? 8.5 : 5.5) : (isPortrait ? 5.5 : 3.5);
                    const zOffset = is100 ? (isPortrait ? 12 : 9) : (isPortrait ? 9 : 6);
                    const lookZ = is100 ? pinAreaZ - 4 : pinAreaZ;
                    desiredPosition.set(0, yOffset, pinAreaZ + zOffset);
                    desiredLookAt.set(0, 0.5, lookZ);
                }
                else if (impactOccurred || (isReplaying && replayFrameIndex > 30)) {
                    // Switch to impact cam during replay after a short delay
                    const lookZ = is100 ? -28 : -24;
                    const camY = is100 ? 6.5 : 5;
                    desiredPosition.set(0, camY, -14);
                    desiredLookAt.set(0, 0.5, lookZ);
                }
                else if (ballBody) {
                    const camY = is100 ? 5.5 : 4;
                    const targetZ = Math.max(ballBody.position.z + 8, -12);
                    const targetX = ballBody.position.x * 0.5;
                    desiredPosition.set(targetX, camY, targetZ);
                    desiredLookAt.set(ballBody.position.x * 0.5, 1, ballBody.position.z - 10);
                }

                camera.position.lerp(desiredPosition, 0.04);
                cameraLookAtTarget.lerp(desiredLookAt, 0.04);
                camera.lookAt(cameraLookAtTarget);
            } else {
                // Idle/Menu Camera
                camera.position.lerp(new THREE.Vector3(0, 4, 12), 0.05);
                cameraLookAtTarget.lerp(new THREE.Vector3(0, 1, 0), 0.05);
                camera.lookAt(cameraLookAtTarget);
            }

            // UI Animations (Pin indicators)
            const time = performance.now() / 1000;
            pinCircles.forEach(circle => {
                circle.scale.setScalar(1 + Math.sin(time * 2) * 0.15);
                circle.material.opacity = (0.4 + (Math.sin(time * 3) + 1) / 2 * 0.6) * 0.5 + 0.3;
            });

            if (typeof updateActionCam === 'function') updateActionCam();
            updateLightTrail();
            updateImpacts();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
