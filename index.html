<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="Bowling_Icon.png">
    <title>Street Bowling 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #05050a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            background: transparent;
            flex-direction: column;
            justify-content: space-between;
            color: white;
            padding: 15px;
            box-sizing: border-box;
            z-index: 1000;
        }

        #action-cam-container {
            pointer-events: auto !important;
            z-index: 100;
        }

        .top-ui {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-start;
            padding-right: 60px;
        }

        .score-board {
            background: rgba(20, 20, 40, 0.85);
            padding: 12px;
            border-radius: 12px;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            max-width: fit-content;
        }

        .history-table {
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            overflow: hidden;
            font-size: 12px;
            text-align: center;
            min-width: 240px;
        }

        .history-table th,
        .history-table td {
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 4px;
            width: 35px;
        }

        .history-table th {
            background: rgba(230, 126, 34, 0.3);
            color: #f39c12;
            text-transform: uppercase;
            font-size: 10px;
        }

        .total-col {
            background: rgba(46, 204, 113, 0.2);
            font-weight: bold;
            color: #2ecc71;
        }

        .instructions {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(231, 76, 60, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            pointer-events: none;
            border: 1px solid #e74c3c;
            width: 70%;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s ease;
        }

        .btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            pointer-events: auto;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, background 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:hover {
            background: #d35400;
        }

        #msg-box {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 25, 0.8);
            padding: 20px;
            border-radius: 24px;
            text-align: center;
            pointer-events: auto;
            display: none;
            width: 280px;
            border: 2px solid #e67e22;
            z-index: 1000;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        #strike-popup {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: clamp(40px, 15vw, 150px);
            font-weight: 900;
            color: #ffffff;
            text-shadow:
                0 0 10px #f1c40f,
                0 0 20px #f1c40f,
                0 0 40px #e67e22,
                0 0 70px #d35400,
                0 0 100px #ff0000;
            z-index: 5001;
            pointer-events: none;
            opacity: 0;
            font-style: italic;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        #strike-popup.show {
            display: block;
            opacity: 1;
            animation: strike-thump 0.5s ease-out forwards, strike-glow 0.8s ease-in-out infinite alternate;
        }

        .menu-container {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            pointer-events: auto;
        }

        .menu-icon-btn {
            background: rgba(20, 20, 40, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 24px;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .settings-popup {
            margin-top: 10px;
            background: rgba(15, 15, 25, 0.95);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #e67e22;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 160px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
        }

        .settings-popup label {
            font-size: 12px;
            font-weight: bold;
            color: #f1c40f;
            letter-spacing: 1px;
        }

        #volume-slider {
            width: 100%;
            cursor: pointer;
            accent-color: #e67e22;
        }

        #vol-percent {
            font-size: 14px;
            font-weight: bold;
        }

        .settings-btn {
            background: rgba(230, 126, 34, 0.2);
            color: white;
            border: 1px solid #e67e22;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            font-size: 12px;
            transition: background 0.2s;
        }

        .settings-btn:hover {
            background: rgba(230, 126, 34, 0.4);
        }

        #screen-dimmer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            z-index: 5000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #screen-dimmer.dimmed {
            opacity: 1;
        }

        #action-cam-container.enlarged {
            width: 90vw !important;
            height: 50vh !important;
            bottom: 50% !important;
            right: 50% !important;
            transform: translate(50%, 50%);
            z-index: 1100;
        }

        #watch-replay-btn {
            pointer-events: auto;
            display: none;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            font-size: 18px;
            background: rgba(255, 215, 0, 0.9);
            color: #000;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            z-index: 1100;
            transition: all 0.3s ease;
        }

        #watch-replay-btn:hover {
            background: #fff;
            transform: translateX(-50%) scale(1.1);
        }

        @media (max-width: 600px) {
            .score-board {
                padding: 8px;
                border-radius: 8px;
            }

            #score-text {
                font-size: 16px !important;
                margin-bottom: 4px !important;
            }

            .history-table {
                min-width: 180px;
                font-size: 10px;
            }

            .history-table th,
            .history-table td {
                padding: 4px 2px;
                width: 25px;
            }

            .menu-container {
                top: 10px !important;
                right: 10px !important;
            }

            .menu-icon-btn {
                font-size: 18px !important;
                padding: 8px !important;
            }

            .settings-popup {
                width: 140px;
                padding: 10px;
            }
        }

        #score-table {
            pointer-events: auto;
            border-collapse: separate;
            border-spacing: 4px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            text-align: center;
            width: 280px;
        }

        #score-table th {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
        }

        #score-table td {
            padding: 8px 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            min-width: 25px;
            font-weight: bold;
        }

        #p1-row td:first-child {
            color: #1e90ff;
            text-shadow: 0 0 8px rgba(30, 144, 255, 0.5);
            font-size: 12px;
        }

        #p2-row td:first-child {
            color: #ff4757;
            text-shadow: 0 0 8px rgba(255, 71, 87, 0.5);
            font-size: 12px;
        }

        #p1-total,
        #p2-total {
            background: rgba(255, 255, 255, 0.15);
            color: #f1c40f;
        }

        @media screen and (max-width: 600px) {
            #score-table {
                width: 220px;
                font-size: 11px;
            }

            #score-table th,
            #score-table td {
                padding: 4px 2px;
            }
        }

        @keyframes strike-thump {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        @keyframes strike-glow {
            from {
                text-shadow: 0 0 10px #fff, 0 0 20px #f1c40f;
            }

            to {
                text-shadow: 0 0 20px #fff, 0 0 40px #e67e22;
            }
        }

        #matchmaking-modal-blocker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 4999;
            pointer-events: auto;
            display: none;
        }

        #matchmaking-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 15, 25, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #e67e22;
            text-align: center;
            pointer-events: auto;
            display: none;
            z-index: 5000;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            width: 280px;
            max-width: 90vw;
        }

        #matchmaking-panel h2 {
            color: #f39c12;
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        #matchmaking-panel p {
            color: #ccc;
            margin: 10px 0;
            font-size: 14px;
        }

        .matchmaking-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        #find-match-btn,
        #solo-play-btn,
        #cancel-search-btn {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #find-match-btn {
            background: #e67e22;
            color: white;
        }

        #find-match-btn:hover:not(:disabled) {
            background: #d35400;
            transform: scale(1.05);
        }

        #find-match-btn:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.7;
        }

        #solo-play-btn {
            background: rgba(100, 100, 150, 0.5);
            color: white;
            border: 1px solid #8888ff;
        }

        #solo-play-btn:hover {
            background: rgba(100, 100, 150, 0.7);
        }

        #cancel-search-btn {
            background: rgba(200, 100, 100, 0.5);
            color: white;
            border: 1px solid #ff8888;
        }

        #cancel-search-btn:hover {
            background: rgba(200, 100, 100, 0.7);
        }

        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(230, 126, 34, 0.3);
            border-radius: 50%;
            border-top-color: #e67e22;
            animation: spin 1s linear infinite;
            margin: 10px 0;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #matchmaking-status {
            min-height: 20px;
            color: #f39c12;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="ui-overlay">
        <div id="action-cam-container" onclick="toggleActionCamSize(event)"
            style="cursor: pointer; position: absolute; bottom: 20px; right: 20px; width: 250px; height: 150px; border: 3px solid #e74c3c; border-radius: 10px; overflow: hidden; display: none; box-shadow: 0 0 20px rgba(231, 76, 60, 0.5); background: #000; pointer-events: auto !important;">
            <div
                style="position:absolute; top:5px; left:5px; color:#e74c3c; font-weight:bold; font-size:10px; z-index:10; pointer-events: none;">
                ACTION CAM (TAP TO ZOOM)
            </div>
            <canvas id="action-canvas" style="pointer-events: none;"></canvas>
        </div>

        <div class="menu-container" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()"
            ontouchmove="event.stopPropagation()">
            <button class="menu-icon-btn" onclick="toggleSettingsMenu()">⚙️</button>
            <div id="settings-menu" class="settings-popup">
                <h3 style="margin: 0 0 10px 0; font-size: 14px; color: #e67e22;">SETTINGS</h3>
                <label>VOLUME</label>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5"
                    oninput="updateVolume(this.value)">
                <div id="vol-percent">50%</div>
                <hr style="width: 100%; border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0;">
                <label>GAME MODE</label>
                <button id="mode-toggle-btn" class="settings-btn" onclick="toggleGameMode()">10 PINS</button>
            </div>
        </div>

        <div class="top-ui">
            <div class="score-board">
                <div id="score-text" style="font-size: 20px; font-weight: bold; color: #f39c12; margin-bottom: 8px;">
                    Pins: 0
                </div>
                <table id="score-table">
                    <thead>
                        <tr>
                            <th>Player</th>
                            <th>1</th>
                            <th>2</th>
                            <th>3</th>
                            <th>4</th>
                            <th>5</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="score-body">
                        <tr id="p1-row">
                            <td>P1 (Blue)</td>
                            <td id="p1-m0">-</td>
                            <td id="p1-m1">-</td>
                            <td id="p1-m2">-</td>
                            <td id="p1-m3">-</td>
                            <td id="p1-m4">-</td>
                            <td id="p1-total" class="total">0</td>
                        </tr>
                        <tr id="p2-row" style="display: none;">
                            <td>P2 (Red)</td>
                            <td id="p2-m0">-</td>
                            <td id="p2-m1">-</td>
                            <td id="p2-m2">-</td>
                            <td id="p2-m3">-</td>
                            <td id="p2-m4">-</td>
                            <td id="p2-total" class="total">0</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="instructions" id="hint">Drag to Position &bull; Flick UP to Launch</div>
        <div id="strike-popup">STRIKE!</div>
        <div id="msg-box" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
            <h1 id="msg-title">STRIKE!</h1>
            <p id="msg-body">Explosive hit!</p>
            <button id="action-btn" class="btn" onclick="handleMatchEnd()">NEXT FRAME</button>
        </div>
        <div id="mode-switch-modal" style="display:none; position:absolute; top:35%; left:50%; transform:translate(-50%, -50%); width:320px; padding:24px; background:rgba(15,15,25,0.97); border:2px solid #e67e22; border-radius:20px; z-index:5100; box-shadow:0 0 40px rgba(0,0,0,0.75); text-align:center;">
            <h2 id="mode-switch-title" style="margin:0 0 12px; color:#f1c40f; font-size:20px;">Mode Change Request</h2>
            <p id="mode-switch-body" style="margin:0 0 18px; color:#ddd; font-size:14px; line-height:1.5;"></p>
            <div id="mode-switch-actions" style="display:flex; justify-content:space-between; gap:10px;">
                <button id="mode-switch-accept" class="btn" style="flex:1;">ACCEPT</button>
                <button id="mode-switch-decline" class="btn" style="flex:1; background:#888;">DECLINE</button>
            </div>
        </div>
        <button id="watch-replay-btn" class="btn" onclick="startReplay()"
            style="display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); pointer-events: auto;">
            WATCH REPLAY
        </button>

        <div id="matchmaking-panel">
            <h2>BOWLING MULTIPLAYER</h2>
            <p>Play with other players online</p>
            <div id="matchmaking-status"></div>
            <div class="matchmaking-buttons">
                <button id="find-match-btn" onclick="startMatchmaking()">FIND MATCH</button>
                <button id="solo-play-btn" onclick="startSinglePlayer()">SINGLE PLAYER</button>
            </div>
            <button id="cancel-search-btn" onclick="cancelMatchmaking()" style="display: none; margin-top: 10px;">CANCEL
                SEARCH</button>
        </div>

        <div id="screen-dimmer"></div>
        <div id="matchmaking-modal-blocker"></div>
    </div>

    <script>
        // --- CONSTANTS ---
        const LANE_Y = 0.1;
        const BALL_RADIUS = 0.35;
        const PIN_HEIGHT = 0.8;
        const TRAIL_MAX_POINTS = 60;
        const MAX_MATCHES = 5;

        // --- STATE ---
        let pins = [];
        let pinCircles = [];
        let targetPinCount = 10;
        let lastPinSoundTime = 0;

        let scene, camera, renderer, world, sunLight;
        let ballBody, ballMesh;
        let laneMesh;
        let groundBody;

        let isBowling = false;
        let isTouching = false;
        let touchStartPos = { x: 0, y: 0 };
        let touchStartTime = 0;
        let lastTouchX = 0;
        let impactParticles = [];
        let trailHistory = [];
        // trailMesh moved to global declarations above
        let randomHookForce = 0;

        let matchHistory = [];
        let currentFallenPins = 0;

        let impactOccurred = false;
        let resetTimer = null;

        let timeScale = 1.0;
        let isCinematicMode = false;
        let cinematicTargetPin = null;

        let audioListener, audioLoader;
        let ballPathSound, pinKnockSound;
        let gameSounds = {};

        let actionCamera, actionRenderer, actionCanvas;
        let actionTargetPin = null;
        let lastTargetSwitchTime = 0;
        const SWITCH_COOLDOWN = 1000;

        const DECK_CENTER_Z = -22;

        let isReplaying = false;
        let replayData = [];
        let replayFrameIndex = 0;

        let modeSwitchRequestPending = false;
        let modeSwitchRequestMode = null;
        let modeSwitchRequester = null;

        let cameraLookAtTarget = new THREE.Vector3(0, 1, 0);

        // Player 1 & 2 Touchpaths (different colors)
        let touchPathLine_P1, touchPathLine2_P1, touchPathLine3_P1;
        let outerGlowLine_P1;
        let touchPathLine_P2, touchPathLine2_P2, touchPathLine3_P2;
        let outerGlowLine_P2;
        let touchPathPoints = [];

        // Player 1 & 2 Trail meshes (different colors)
        let trailMesh_P1, trailMesh_P2;

        const groundMat = new CANNON.Material();
        const ballMat = new CANNON.Material();
        const pinMat = new CANNON.Material();

        let leftGutter, rightGutter;
        let leftWallJoint, rightWallJoint;

        let sounds = {};

        let leftWallMesh, rightWallMesh;
        let leftWallBody, rightWallBody;

        let currentPinVolume = 0.7;
        let lastPinHitTime = 0;

        // --- MULTIPLAYER VARIABLES ---
        let isHost = true;  // Default to true for single-player (acts as host/p1)
        let myPlayerId = 1;
        let myPlayerOffset = 0;
        let isMultiplayerActive = false;
        let conn = null;
        let peer = null;
        let opponentBallMesh;

        let playAgainRequested = false;
        let playAgainOpponentRequested = false;
        let playAgainCountdownTimer = null;
        let playAgainCountdownRemaining = 5;

        let isDragging = false;
        let mouse = new THREE.Vector2();
        let raycaster = new THREE.Raycaster();

        let scores = {
            p1: [],
            p2: []
        };

        const LOBBY_ID = "street-bowling-shared-lobby-v1";

        // --- MATCHMAKING STATE ---
        let isSearchingForMatch = false;
        let matchmakingTimeout = null;

        // --- MULTIPLAYER FUNCTIONS ---

        function findRandomMatch() {
            console.log("DEBUG: searching for match...");

            // Make sure peer exists before trying to connect
            if (!peer) {
                console.error("ERROR: Peer not initialized");
                updateMatchmakingStatus('Error: Peer not ready');
                return;
            }

            // Attempt to connect to the lobby
            const connAttempt = peer.connect(LOBBY_ID, {
                reliable: true,
                serialization: 'json'
            });

            const timeout = setTimeout(() => {
                console.log("DEBUG: No host found. I am now the Host.");
                updateMatchmakingStatus('Creating room...');

                // Close the failed connection attempt
                if (connAttempt && connAttempt.close) {
                    try { connAttempt.close(); } catch (e) { }
                }

                setTimeout(setupAsHost, 1000);
            }, 2500);

            matchmakingTimeout = timeout;

            // Handle successful connection
            if (connAttempt) {
                connAttempt.on('open', () => {
                    clearTimeout(timeout);
                    matchmakingTimeout = null;
                    console.log("DEBUG: Found a Host! Joining as Guest.");
                    updateMatchmakingStatus('found');
                    conn = connAttempt;
                    isHost = false;
                    myPlayerOffset = 15;

                    // Delete old lanes that were created at offset 0 during init()
                    if (laneMesh) { scene.remove(laneMesh); laneMesh.geometry.dispose(); laneMesh.material.dispose(); }
                    if (leftGutter) { scene.remove(leftGutter); leftGutter.geometry.dispose(); leftGutter.material.dispose(); }
                    if (rightGutter) { scene.remove(rightGutter); rightGutter.geometry.dispose(); rightGutter.material.dispose(); }
                    if (leftWallMesh) { scene.remove(leftWallMesh); leftWallMesh.geometry.dispose(); leftWallMesh.material.dispose(); }
                    if (rightWallMesh) { scene.remove(rightWallMesh); rightWallMesh.geometry.dispose(); rightWallMesh.material.dispose(); }
                    if (groundBody) world.remove(groundBody);
                    if (leftWallBody) world.remove(leftWallBody);
                    if (rightWallBody) world.remove(rightWallBody);

                    // Create new lanes at the correct offset for Player 2
                    createStreetEnvironment(myPlayerOffset);
                    createPins(myPlayerOffset);

                    // Update camera to look from Player 2's lane
                    camera.position.set(myPlayerOffset, 4, 12);
                    camera.lookAt(myPlayerOffset, 1, 0);

                    // Update ball position to Player 2's lane
                    if (ballBody) ballBody.position.set(myPlayerOffset, LANE_Y + BALL_RADIUS + 0.05, 6);
                    if (ballMesh) ballMesh.position.set(myPlayerOffset, LANE_Y + BALL_RADIUS + 0.05, 6);

                    setupDataListeners();
                    activateMultiplayerMode(false);
                    hideMatchmakingPanel();
                    isSearchingForMatch = false;
                    resetGame();
                });

                // Handle connection errors (expected: peer-unavailable when no host exists)
                connAttempt.on('error', (err) => {
                    // "peer-unavailable" is expected when no host exists yet - this is normal matchmaking
                    if (err.type === 'peer-unavailable') {
                        console.log("DEBUG: No host available at lobby, will become host...");
                    } else {
                        console.error("DEBUG: Connection attempt error:", err.type);
                    }
                    clearTimeout(timeout);
                    updateMatchmakingStatus('No players found, creating room...');
                    setTimeout(setupAsHost, 1000);
                });

                // Handle connection closed
                connAttempt.on('close', () => {
                    console.log("DEBUG: Connection by peer ended, becoming host");
                    clearTimeout(timeout);
                    if (!isHost) {
                        setupAsHost();
                    }
                });
            }
        }

        function setupAsHost() {
            if (peer) {
                try {
                    peer.destroy();
                } catch (e) {
                    console.log("DEBUG: Error destroying peer:", e);
                }
            }

            peer = new Peer(LOBBY_ID, {
                config: {
                    'iceServers': [
                        { url: 'stun:stun.l.google.com:19302' },
                        { url: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });

            peer.on('open', (id) => {
                isHost = true;
                console.log("DEBUG: Lobby created with ID:", id);
                updateMatchmakingStatus('Waiting for Player 2...');

                peer.on('connection', (incomingConn) => {
                    if (conn) {
                        console.log("DEBUG: Already have a player. Rejecting extra join.");
                        incomingConn.close();
                        return;
                    }
                    conn = incomingConn;
                    console.log("DEBUG: Player 2 connected!");
                    updateMatchmakingStatus('found');
                    hideMatchmakingPanel();
                    isSearchingForMatch = false;
                    setupDataListeners();
                    activateMultiplayerMode(true);
                    resetGame();
                });
            });

            peer.on('error', (err) => {
                // Log errors but suppress certain expected errors
                if (err.type === 'unavailable-id') {
                    console.log("DEBUG: Lobby ID taken, retrying matchmaking...");
                    setTimeout(() => {
                        if (isSearchingForMatch) {
                            findRandomMatch();
                        }
                    }, 800);
                } else if (err.type === 'peer-unavailable') {
                    console.log("DEBUG: Peer unavailable (expected)");
                } else if (err.type === 'disconnected') {
                    console.log("DEBUG: Peer disconnected (expected)");
                } else {
                    console.error("DEBUG: Host peer error:", err.type);
                    updateMatchmakingStatus('Error: ' + err.type);
                }
            });
        }

        function initNetworking() {
            peer = new Peer();

            peer.on('open', (id) => {
                console.log("Your Peer ID: joinGame(\"" + id + "\")");
            });

            peer.on('error', (err) => {
                // Suppress expected matchmaking errors
                if (err.type === 'peer-unavailable' || err.type === 'unavailable-id') {
                    console.log("DEBUG: PeerJS info:", err.type);
                } else {
                    console.error("PeerJS Error:", err.type, err);
                }
            });

            peer.on('connection', (incomingConn) => {
                conn = incomingConn;
                conn.on('open', () => {
                    console.log("DEBUG: Connection established with Guest!");
                    activateMultiplayerMode(true);
                    setupDataListeners();
                    resetGame();
                });
            });
        }

        function setupDataListeners() {
            if (!conn) {
                console.warn("DEBUG: setupDataListeners called but 'conn' is undefined.");
                return;
            }

            console.log("DEBUG: Data listeners attached to connection.");

            conn.on('open', () => {
                console.log("DEBUG: P2P Connection fully open!");
                activateMultiplayerMode(isHost);
            });

            conn.on('data', (data) => {
                if (data.type === 'remoteBall' || data.type === 'ballUpdate') {
                    updateOpponentBall(data);
                } else if (data.type === 'modeSwitchRequest') {
                    handleModeSwitchRequest(data);
                } else if (data.type === 'modeSwitchResponse') {
                    handleModeSwitchResponse(data);
                }

                if (data.type === 'scoreUpdate') {
                    const targetId = data.senderId; // Use the ID sent by the other player
                    scores[targetId] = data.history;
                    updateScoreTable(targetId);
                    updateMultiplayerMatchState();
                } else if (data.type === 'playAgainRequest') {
                    receivePlayAgainRequest(data);
                }
            });

            conn.on('close', () => {
                console.log("DEBUG: Opponent disconnected.");
                isMultiplayerActive = false;

                if (opponentBallMesh) opponentBallMesh.visible = false;

                const msgTitle = document.getElementById('msg-title');
                if (msgTitle) {
                    msgTitle.innerText = "PLAYER LEFT";
                    document.getElementById('msg-box').style.display = 'block';
                    document.getElementById('msg-body').innerText = "Opponent disconnected. Refresh to find a new match.";
                    document.getElementById('action-btn').innerHTML = "REFRESH";
                    document.getElementById('action-btn').onclick = () => location.reload();
                }
            });
        }

        function showMatchmakingPanel() {
            const panel = document.getElementById('matchmaking-panel');
            const blocker = document.getElementById('matchmaking-modal-blocker');
            if (panel) panel.style.display = 'block';
            if (blocker) blocker.style.display = 'block';
        }

        function hideMatchmakingPanel() {
            const panel = document.getElementById('matchmaking-panel');
            const blocker = document.getElementById('matchmaking-modal-blocker');
            if (panel) panel.style.display = 'none';
            if (blocker) blocker.style.display = 'none';
        }

        function updateMatchmakingStatus(message) {
            const status = document.getElementById('matchmaking-status');
            if (status) {
                if (message === 'searching') {
                    status.innerHTML = '<div class="loading-spinner"></div><p>Searching for players...</p>';
                } else if (message === 'found') {
                    status.innerHTML = '<p style="color: #2ecc71;">✓ Match found! Connecting...</p>';
                } else if (message === 'timeout') {
                    status.innerHTML = '<p style="color: #f39c12;">No players found. Starting as Host...</p>';
                } else {
                    status.innerHTML = `<p>${message}</p>`;
                }
            }
        }

        function startMatchmaking() {
            console.log("DEBUG: Starting matchmaking...");
            isSearchingForMatch = true;
            document.getElementById('find-match-btn').disabled = true;
            document.getElementById('solo-play-btn').disabled = true;
            document.getElementById('cancel-search-btn').style.display = 'block';
            updateMatchmakingStatus('searching');

            // Initialize peer connection for matchmaking if needed
            if (!peer) {
                peer = new Peer({
                    config: {
                        'iceServers': [
                            { url: 'stun:stun.l.google.com:19302' },
                            { url: 'stun:stun1.l.google.com:19302' }
                        ]
                    }
                });

                let peerReady = false;

                peer.on('open', (id) => {
                    console.log("DEBUG: Peer ready with ID:", id);
                    peerReady = true;
                    if (isSearchingForMatch) {
                        // Now that peer is ready, try to find a match
                        findRandomMatch();
                    }
                });

                peer.on('error', (err) => {
                    // Suppress peer-unavailable errors - they're expected during matchmaking
                    if (err.type === 'peer-unavailable') {
                        console.log("DEBUG: Peer unavailable (expected during matchmaking)");
                    } else if (err.type === 'unavailable-id') {
                        console.log("DEBUG: ID unavailable, will retry matchmaking");
                    } else {
                        console.error("PeerJS Error:", err.type, err);
                        if (isSearchingForMatch) {
                            updateMatchmakingStatus('Connection error: ' + err.type);
                        }
                    }
                });

                // If peer doesn't open in 3 seconds, try anyway
                setTimeout(() => {
                    if (isSearchingForMatch && !peerReady) {
                        console.log("DEBUG: Peer not ready, attempting connection anyway");
                        findRandomMatch();
                    }
                }, 3000);
            } else {
                // Peer already exists, try to find match
                findRandomMatch();
            }
        }

        function cancelMatchmaking() {
            console.log("DEBUG: Cancelling matchmaking...");
            isSearchingForMatch = false;
            if (matchmakingTimeout) {
                clearTimeout(matchmakingTimeout);
                matchmakingTimeout = null;
            }
            if (peer) {
                peer.destroy();
                peer = null;
            }
            document.getElementById('find-match-btn').disabled = false;
            document.getElementById('solo-play-btn').disabled = false;
            document.getElementById('cancel-search-btn').style.display = 'none';
            updateMatchmakingStatus('');
        }

        function startSinglePlayer() {
            console.log("DEBUG: Starting single player...");
            hideMatchmakingPanel();
            resetGame();
        }

        function recordRoundScore(scoreValue) {
            // Force the ID based on the connection role
            // If I am the host, I am p1. If I am the guest, I am p2.
            const myId = isHost ? "p1" : "p2";

            if (!scores[myId]) scores[myId] = [];
            scores[myId].push(scoreValue);

            // Update local UI
            updateScoreTable(myId);

            // Sync to the other player
            if (isMultiplayerActive && conn && conn.open) {
                conn.send({
                    type: 'scoreUpdate',
                    senderId: myId, // Explicitly tell the other person WHO I AM
                    history: scores[myId]
                });
            }

            updateMultiplayerMatchState();
        }

        function getLocalPlayerId() {
            return isHost ? 'p1' : 'p2';
        }

        function getOpponentPlayerId() {
            return isHost ? 'p2' : 'p1';
        }

        function isPlayerComplete(playerId) {
            return Array.isArray(scores[playerId]) && scores[playerId].length >= MAX_MATCHES;
        }

        function getPlayerTotal(playerId) {
            return (scores[playerId] || []).reduce((sum, value) => sum + (typeof value === 'number' ? value : 0), 0);
        }

        function updateMultiplayerMatchState() {
            if (!isMultiplayerActive) return;

            const localDone = isPlayerComplete(getLocalPlayerId());
            const opponentDone = isPlayerComplete(getOpponentPlayerId());

            if (localDone && opponentDone) {
                showMultiplayerFinalResult();
            } else if (localDone) {
                showMultiplayerWaitMessage(true);
            } else if (opponentDone) {
                showMultiplayerWaitMessage(false);
            }
        }

        function resetPlayAgainState() {
            playAgainRequested = false;
            playAgainOpponentRequested = false;
            playAgainCountdownRemaining = 5;
            if (playAgainCountdownTimer) {
                clearInterval(playAgainCountdownTimer);
                playAgainCountdownTimer = null;
            }
        }

        function getLocalPlayerId() {
            return isHost ? 'p1' : 'p2';
        }

        function getOpponentPlayerId() {
            return isHost ? 'p2' : 'p1';
        }

        function sendPlayAgainRequest() {
            if (!isMultiplayerActive || !conn || !conn.open) {
                fullReset();
                return;
            }
            if (playAgainRequested) return;
            playAgainRequested = true;
            conn.send({ type: 'playAgainRequest', from: getLocalPlayerId() });
            startPlayAgainCountdown('Play again confirmed. Restarting in', 'Waiting for opponent...');

            if (playAgainOpponentRequested) {
                beginPlayAgain();
            }
        }

        function receivePlayAgainRequest(data) {
            playAgainOpponentRequested = true;
            if (playAgainRequested) {
                beginPlayAgain();
                return;
            }
            showPlayAgainCountdownMessage();
        }

        function showPlayAgainCountdownMessage() {
            const msgBox = document.getElementById('msg-box');
            const replayBtn = document.getElementById('watch-replay-btn');
            const title = document.getElementById('msg-title');
            const body = document.getElementById('msg-body');
            const btn = document.getElementById('action-btn');

            msgBox.style.display = 'block';
            replayBtn.style.display = 'none';
            triggerDimmer(false);

            btn.style.display = 'inline-block';
            btn.disabled = false;
            btn.innerText = 'CONTINUE';
            btn.onclick = sendPlayAgainRequest;

            title.innerText = 'OPPONENT READY';
            startPlayAgainCountdown('Auto restart in', 'Waiting for you to confirm:');
            body.innerText = `Opponent wants a rematch. ${playAgainCountdownRemaining} seconds until auto restart.`;
        }

        function startPlayAgainCountdown(successText, waitingText) {
            const msgBox = document.getElementById('msg-box');
            const body = document.getElementById('msg-body');
            const btn = document.getElementById('action-btn');

            if (playAgainCountdownTimer) {
                clearInterval(playAgainCountdownTimer);
            }
            playAgainCountdownRemaining = 5;
            playAgainCountdownTimer = setInterval(() => {
                playAgainCountdownRemaining -= 1;
                if (playAgainCountdownRemaining <= 0) {
                    clearInterval(playAgainCountdownTimer);
                    playAgainCountdownTimer = null;
                    if (!playAgainRequested) {
                        if (!playAgainOpponentRequested) {
                            sendPlayAgainRequest();
                        }
                    }
                    beginPlayAgain();
                } else {
                    if (body) {
                        body.innerText = `${waitingText} ${playAgainCountdownRemaining} seconds.`;
                    }
                    if (btn && btn.innerText === 'CONTINUE') {
                        btn.innerText = `CONTINUE (${playAgainCountdownRemaining})`;
                    }
                }
            }, 1000);

            if (body) {
                body.innerText = `${waitingText} ${playAgainCountdownRemaining} seconds.`;
            }
            if (btn && btn.innerText === 'CONTINUE') {
                btn.innerText = `CONTINUE (${playAgainCountdownRemaining})`;
            }
        }

        function beginPlayAgain() {
            resetPlayAgainState();
            const msgBox = document.getElementById('msg-box');
            if (msgBox) msgBox.style.display = 'none';
            fullReset();
        }

        function showMultiplayerWaitMessage(localFinished) {
            const msgBox = document.getElementById('msg-box');
            const replayBtn = document.getElementById('watch-replay-btn');
            const title = document.getElementById('msg-title');
            const body = document.getElementById('msg-body');
            const btn = document.getElementById('action-btn');

            msgBox.style.display = 'block';
            replayBtn.style.display = 'none';
            triggerDimmer(false);

            if (localFinished) {
                title.innerText = 'MATCH COMPLETE';
                body.innerText = 'You have finished 5 matches. Waiting for your opponent to finish their 5 matches...';
                btn.style.display = 'none';
            } else {
                title.innerText = 'OPPONENT COMPLETE';
                body.innerText = 'Your opponent has finished 5 matches. Continue your remaining frames to complete the match.';
                btn.style.display = 'inline-block';
                btn.disabled = false;
                btn.innerText = 'CONTINUE';
                btn.onclick = () => { msgBox.style.display = 'none'; };
            }
        }

        function showMultiplayerFinalResult() {
            const msgBox = document.getElementById('msg-box');
            const replayBtn = document.getElementById('watch-replay-btn');
            const title = document.getElementById('msg-title');
            const body = document.getElementById('msg-body');
            const btn = document.getElementById('action-btn');

            const p1Total = getPlayerTotal('p1');
            const p2Total = getPlayerTotal('p2');
            let winnerText;
            if (p1Total === p2Total) {
                winnerText = 'DRAW';
            } else if (p1Total > p2Total) {
                winnerText = 'PLAYER 1 WINS!';
            } else {
                winnerText = 'PLAYER 2 WINS!';
            }

            title.innerText = 'FINAL RESULT';
            body.innerHTML = `
                <div style="font-size:18px; font-weight:bold; margin-bottom:12px; color:#f1c40f;">${winnerText}</div>
                <div style="display:flex; justify-content:space-between; gap:12px; margin-top:10px;">
                    <div style="flex:1; background:rgba(255,255,255,0.08); padding:12px; border-radius:12px; text-align:center;">
                        <div style="font-size:14px; font-weight:bold; margin-bottom:8px;">PLAYER 1</div>
                        <div>${(scores.p1 || []).map(v => v === undefined ? '-' : v).join(' | ')}</div>
                        <div style="margin-top:10px; font-size:20px; font-weight:bold; color:#1e90ff;">${p1Total}</div>
                    </div>
                    <div style="flex:1; background:rgba(255,255,255,0.08); padding:12px; border-radius:12px; text-align:center;">
                        <div style="font-size:14px; font-weight:bold; margin-bottom:8px;">PLAYER 2</div>
                        <div>${(scores.p2 || []).map(v => v === undefined ? '-' : v).join(' | ')}</div>
                        <div style="margin-top:10px; font-size:20px; font-weight:bold; color:#ff4757;">${p2Total}</div>
                    </div>
                </div>`;

            btn.innerText = 'PLAY AGAIN';
            btn.style.display = 'inline-block';
            btn.disabled = false;
            btn.onclick = sendPlayAgainRequest;
            replayBtn.style.display = 'none';
            msgBox.style.display = 'block';

            const strikePopup = document.getElementById('strike-popup');
            if (strikePopup) {
                strikePopup.innerText = winnerText;
                strikePopup.classList.add('show');
                setTimeout(() => strikePopup.classList.remove('show'), 3000);
            }
        }

        function joinGame(targetHostId) {
            isHost = false;  // I am joining as a guest (Player 2)
            peer = new Peer();
            peer.on('open', (myId) => {
                conn = peer.connect(targetHostId);
                conn.on('open', () => {
                    console.log("DEBUG: Connected to Host!");
                    myPlayerOffset = 15;

                    // Delete old lanes that were created at offset 0 during init()
                    if (laneMesh) { scene.remove(laneMesh); laneMesh.geometry.dispose(); laneMesh.material.dispose(); }
                    if (leftGutter) { scene.remove(leftGutter); leftGutter.geometry.dispose(); leftGutter.material.dispose(); }
                    if (rightGutter) { scene.remove(rightGutter); rightGutter.geometry.dispose(); rightGutter.material.dispose(); }
                    if (leftWallMesh) { scene.remove(leftWallMesh); leftWallMesh.geometry.dispose(); leftWallMesh.material.dispose(); }
                    if (rightWallMesh) { scene.remove(rightWallMesh); rightWallMesh.geometry.dispose(); rightWallMesh.material.dispose(); }
                    if (groundBody) world.remove(groundBody);
                    if (leftWallBody) world.remove(leftWallBody);
                    if (rightWallBody) world.remove(rightWallBody);

                    // Create new lanes at the correct offset for Player 2
                    createStreetEnvironment(myPlayerOffset);
                    createPins(myPlayerOffset);

                    // Update camera to look from Player 2's lane
                    camera.position.set(myPlayerOffset, 4, 12);
                    camera.lookAt(myPlayerOffset, 1, 0);

                    // Update ball position to Player 2's lane
                    if (ballBody) ballBody.position.set(myPlayerOffset, LANE_Y + BALL_RADIUS + 0.05, 6);
                    if (ballMesh) ballMesh.position.set(myPlayerOffset, LANE_Y + BALL_RADIUS + 0.05, 6);

                    activateMultiplayerMode(false);
                    setupDataListeners();
                    resetGame();
                });
            });
        }

        function updateOpponentBall(data) {
            if (!opponentBallMesh) return;
            if (!opponentBallMesh.visible) opponentBallMesh.visible = true;
            opponentBallMesh.position.set(data.pos.x, data.pos.y, data.pos.z);
            opponentBallMesh.quaternion.set(data.quat.x, data.quat.y, data.quat.z, data.quat.w);
        }

        function activateMultiplayerMode(isHostRole) {
            isMultiplayerActive = true;
            const p2Row = document.getElementById('p2-row');
            if (p2Row) p2Row.style.display = 'table-row';

            const remoteOffset = isHostRole ? 15 : 0;

            console.log("DEBUG: Building remote lane at offset " + remoteOffset);
            createStreetEnvironment(remoteOffset);
            createPins(remoteOffset);

            if (opponentBallMesh) opponentBallMesh.visible = true;

            if (isHostRole) {
                ballMesh.material.color.setHex(0x1e90ff);
                opponentBallMesh.material.color.setHex(0xff0000);
            } else {
                ballMesh.material.color.setHex(0xff0000);
                opponentBallMesh.material.color.setHex(0x1e90ff);
            }
        }

        // --- GAME FUNCTIONS ---

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010105);
            scene.fog = new THREE.FogExp2(0x010105, 0.03);

            scene.add(touchPathLine_P2, touchPathLine2_P2, touchPathLine3_P2);

            const outerGlowMaterial_P2 = new THREE.LineBasicMaterial({
                color: 0xff3333, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending
            });
            outerGlowLine_P2 = new THREE.Line(new THREE.BufferGeometry(), outerGlowMaterial_P2);
            outerGlowLine_P2.scale.set(1.02, 1, 1.02);
            scene.add(outerGlowLine_P2);

            // 4. Street Lamps
            const streetLamp1 = new THREE.PointLight(0xffaa44, 1.5, 50);
            streetLamp1.position.set(startX + 10, 10, -15);
            scene.add(streetLamp1);

            const streetLamp2 = new THREE.PointLight(0x00ffff, 4, 40);
            streetLamp2.position.set(startX - 5, 8, -30);
            scene.add(streetLamp2);

            // 5. AUDIO SETUP
            audioListener = new THREE.AudioListener();
            camera.add(audioListener);
            audioLoader = new THREE.AudioLoader();

            if (typeof gameSounds === 'undefined') window.gameSounds = {};
            sounds = gameSounds;

            ballPathSound = new THREE.Audio(audioListener);
            audioLoader.load('bowling-ball-path.mp3', function (buffer) {
                ballPathSound.setBuffer(buffer);
                ballPathSound.setLoop(true);
                ballPathSound.setVolume(0.5);
                gameSounds['ball_roll'] = ballPathSound;
            });

            pinKnockSound = new THREE.Audio(audioListener);
            audioLoader.load('single-bowling-pin-knock.mp3', function (buffer) {

                gameSounds['collision'] = pinKnockSound;
