<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Street Bowling 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #05050a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: white;
            padding: 15px;
            box-sizing: border-box;
        }

        .top-ui {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-start;
        }

        .score-board {
            background: rgba(20, 20, 40, 0.85);
            padding: 12px;
            border-radius: 12px;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .history-table {
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            overflow: hidden;
            font-size: 12px;
            text-align: center;
            min-width: 240px;
        }

        .history-table th,
        .history-table td {
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 4px;
            width: 35px;
        }

        .history-table th {
            background: rgba(230, 126, 34, 0.3);
            color: #f39c12;
            text-transform: uppercase;
            font-size: 10px;
        }

        .total-col {
            background: rgba(46, 204, 113, 0.2);
            font-weight: bold;
            color: #2ecc71;
        }

        .instructions {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(231, 76, 60, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            pointer-events: none;
            border: 1px solid #e74c3c;
            width: 70%;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s ease;
        }

        .btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            pointer-events: auto;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, background 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:hover {
            background: #d35400;
        }

        #msg-box {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            /* Remove the translateY(-50%) */
            background: rgba(15, 15, 25, 0.8);
            /* Added more transparency */
            padding: 20px;
            /* Reduced padding */
            border-radius: 24px;
            text-align: center;
            pointer-events: auto;
            display: none;
            width: 280px;
            border: 2px solid #e67e22;
            z-index: 100;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        /* Strike Popup Styling */
        /* Updated Strike Popup Styling */
        #strike-popup {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: clamp(40px, 15vw, 150px);
            /* Slightly larger for impact */
            font-weight: 900;
            color: #ffffff;
            /* White core for a "hotter" look */
            /* Multi-layered shadow for a neon/fire effect */
            text-shadow:
                0 0 10px #f1c40f,
                0 0 20px #f1c40f,
                0 0 40px #e67e22,
                0 0 70px #d35400,
                0 0 100px #ff0000;
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            font-style: italic;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* Thumping animation when the popup shows */
        @keyframes strike-thump {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 1;
            }

            70% {
                transform: translate(-50%, -50%) scale(1.1);
            }

            100% {
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        /* Pulsing glow animation */
        @keyframes strike-glow {
            from {
                text-shadow: 0 0 20px #f1c40f, 0 0 40px #e67e22;
            }

            to {
                text-shadow: 0 0 40px #ffffff, 0 0 80px #ff0000, 0 0 120px #ff0000;
            }
        }

        #strike-popup.show {
            opacity: 1;
            animation:
                strike-thump 0.5s ease-out forwards,
                strike-glow 0.8s ease-in-out infinite alternate;
        }
    </style>
</head>

<body>

    <div id="ui-overlay">
        <div class="top-ui">
            <div class="score-board">
                <div id="score-text" style="font-size: 20px; font-weight: bold; color: #f39c12; margin-bottom: 8px;">
                    Pins: 0</div>
                <table class="history-table" id="history-table">
                    <thead>
                        <tr>
                            <th>M1</th>
                            <th>M2</th>
                            <th>M3</th>
                            <th>M4</th>
                            <th>M5</th>
                            <th class="total-col">TOT</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td id="m0">-</td>
                            <td id="m1">-</td>
                            <td id="m2">-</td>
                            <td id="m3">-</td>
                            <td id="m4">-</td>
                            <td id="total-score" class="total-col">0</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="strike-popup">STRIKE!</div>

        <div class="instructions" id="hint">
            Drag to Position &bull; Flick UP to Launch
        </div>

        <div id="msg-box">
            <h1 id="msg-title" style="margin-top: 0; color: #f1c40f;">STRIKE!</h1>
            <p id="msg-body">Explosive hit!</p>
            <button id="action-btn" class="btn" onclick="handleMatchEnd()">NEXT FRAME</button>
        </div>
    </div>

    <script>
        // --- CONSTANTS ---
        const LANE_Y = 0.1;
        const BALL_RADIUS = 0.35;
        const PIN_HEIGHT = 0.8;
        const TRAIL_MAX_POINTS = 60;
        const MAX_MATCHES = 5;

        // --- STATE ---
        let pins = [];
        let pinCircles = []; // Add this line
        let pinSoundPool = []; // For multiple pin hits
        const POOL_SIZE = 10;

        let scene, camera, renderer, world, sunLight;
        let ballBody, ballMesh;
        let isBowling = false;
        let isTouching = false;
        let touchStartPos = { x: 0, y: 0 };
        let touchStartTime = 0;
        let impactParticles = [];
        let trailHistory = [];
        let trailMesh;
        let randomHookForce = 0;

        let matchHistory = [];
        let currentFallenPins = 0;

        let impactOccurred = false;
        let resetTimer = null;

        // --- ADD THESE THREE LINES ---
        let timeScale = 1.0;
        let isCinematicMode = false;
        let cinematicTargetPin = null;
        let leftWallMesh, rightWallMesh;
        let shakeIntensity = 0;

        let audioListener, audioLoader;
        let ballPathSound, pinKnockSound;
        // let listener, audioLoader, rollingSound;

        // Add these with your other globals

        const groundMat = new CANNON.Material();
        const ballMat = new CANNON.Material();
        const pinMat = new CANNON.Material();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010105);
            scene.fog = new THREE.Fog(0x010105, 30, 100);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.35));

            sunLight = new THREE.DirectionalLight(0xffffff, 0.7);
            sunLight.position.set(10, 25, 15);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 1024;
            sunLight.shadow.mapSize.height = 1024;
            scene.add(sunLight);

            const streetLamp1 = new THREE.PointLight(0xffaa44, 5, 40);
            streetLamp1.position.set(5, 8, -20);
            scene.add(streetLamp1);

            const streetLamp2 = new THREE.PointLight(0x00ffff, 4, 40);
            streetLamp2.position.set(-5, 8, -30);
            scene.add(streetLamp2);

            // Add this inside function init()
            audioListener = new THREE.AudioListener();
            camera.add(audioListener);

            audioLoader = new THREE.AudioLoader();

            // Load Ball Path Sound (Looping)
            ballPathSound = new THREE.Audio(audioListener);
            audioLoader.load('bowling-ball-path.mp3', function (buffer) {
                ballPathSound.setBuffer(buffer);
                ballPathSound.setLoop(true);
                ballPathSound.setVolume(0.5);
            });

            // Load Pin Knock Sound
            pinKnockSound = new THREE.Audio(audioListener);
            audioLoader.load('single-bowling-pin-knock.mp3', function (buffer) {
                pinKnockSound.setBuffer(buffer);
                pinKnockSound.setVolume(0.7);
            });

            world = new CANNON.World();
            world.gravity.set(0, -18, 0);

            const ballGroundContact = new CANNON.ContactMaterial(ballMat, groundMat, { friction: 0.2, restitution: 0.1 });
            const ballPinContact = new CANNON.ContactMaterial(ballMat, pinMat, { friction: 0.4, restitution: 0.3 });
            const pinPinContact = new CANNON.ContactMaterial(pinMat, pinMat, { friction: 0.5, restitution: 0.2 });
            const pinGroundContact = new CANNON.ContactMaterial(pinMat, groundMat, { friction: 0.6, restitution: 0.1 });

            world.addContactMaterial(ballGroundContact);
            world.addContactMaterial(ballPinContact);
            world.addContactMaterial(pinPinContact);
            world.addContactMaterial(pinGroundContact);

            createStreetEnvironment();
            createBall();
            createPins();
            initLightTrail();

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('touchstart', onTouchStart, { passive: false });
            window.addEventListener('touchmove', onTouchMove, { passive: false });
            window.addEventListener('touchend', onTouchEnd, { passive: false });

            window.addEventListener('mousedown', (e) => onTouchStart({ touches: [{ clientX: e.clientX, clientY: e.clientY }], preventDefault: () => { } }));
            window.addEventListener('mousemove', (e) => { if (isTouching) onTouchMove({ touches: [{ clientX: e.clientX, clientY: e.clientY }], preventDefault: () => { } }); });
            window.addEventListener('mouseup', (e) => onTouchEnd({ changedTouches: [{ clientX: e.clientX, clientY: e.clientY }], preventDefault: () => { } }));

            resetGame();

            animate();
        }

        function triggerScreenShake(amount) {
            shakeIntensity = amount;
        }

        function createStreetEnvironment() {
            const laneGeo = new THREE.BoxGeometry(4.5, 0.2, 100);
            const laneMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.95, metalness: 0.05 });
            const laneMesh = new THREE.Mesh(laneGeo, laneMat);
            laneMesh.position.set(0, 0, -35);
            laneMesh.receiveShadow = true;
            scene.add(laneMesh);

            const wallGeo = new THREE.BoxGeometry(1.2, 18, 100);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x0d0d0d, transparent: true, opacity: 1 });

            leftWallMesh = new THREE.Mesh(wallGeo, wallMat);
            leftWallMesh.position.set(-4.8, 9, -35);
            scene.add(leftWallMesh);

            rightWallMesh = new THREE.Mesh(wallGeo, wallMat.clone());
            rightWallMesh.position.set(4.8, 9, -35);
            scene.add(rightWallMesh);

            const groundShape = new CANNON.Box(new CANNON.Vec3(2.25, 0.1, 50));
            const groundBody = new CANNON.Body({ mass: 0, material: groundMat });
            groundBody.addShape(groundShape);
            groundBody.position.set(0, 0, -35);
            world.addBody(groundBody);

            const physicsWallShape = new CANNON.Box(new CANNON.Vec3(0.6, 9, 50));
            const leftWallBody = new CANNON.Body({ mass: 0, material: groundMat });
            leftWallBody.addShape(physicsWallShape);
            leftWallBody.position.set(-4.8, 9, -35);
            world.addBody(leftWallBody);

            const rightWallBody = new CANNON.Body({ mass: 0, material: groundMat });
            rightWallBody.addShape(physicsWallShape);
            rightWallBody.position.set(4.8, 9, -35);
            world.addBody(rightWallBody);
        }

        function createBall() {
            ballMesh = new THREE.Mesh(
                new THREE.SphereGeometry(BALL_RADIUS, 32, 32),
                new THREE.MeshPhongMaterial({ color: 0x00eeff, shininess: 250, emissive: 0x003366 })
            );
            ballMesh.castShadow = true;
            scene.add(ballMesh);

            const ballShape = new CANNON.Sphere(BALL_RADIUS);
            // Start with mass 0 to keep it in place
            ballBody = new CANNON.Body({ mass: 0, shape: ballShape, material: ballMat });

            ballBody.type = CANNON.Body.STATIC;
            ballBody.mass = 0;
            ballBody.updateMassProperties();

            // Explicitly set the position
            const startPos = new CANNON.Vec3(0, LANE_Y + BALL_RADIUS + 0.05, 6);
            ballBody.position.copy(startPos);
            world.addBody(ballBody);

            // Sync mesh immediately
            ballMesh.position.copy(ballBody.position);
        }

        function createPinGeometry() {
            const points = [];
            points.push(new THREE.Vector2(0, -0.4));
            points.push(new THREE.Vector2(0.12, -0.4));
            points.push(new THREE.Vector2(0.16, -0.25));
            points.push(new THREE.Vector2(0.15, -0.15));
            points.push(new THREE.Vector2(0.08, 0.08));
            points.push(new THREE.Vector2(0.06, 0.22));
            points.push(new THREE.Vector2(0.09, 0.32));
            points.push(new THREE.Vector2(0.07, 0.38));
            points.push(new THREE.Vector2(0, 0.4));
            return new THREE.LatheGeometry(points, 24);
        }

        function createPins() {
            const pinGeo = createPinGeometry();
            const pinMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 200 });
            const stripeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const stripeGeo = new THREE.CylinderGeometry(0.07, 0.07, 0.03, 16);

            const SCORE_RADIUS = 0.22;
            const circleGeo = new THREE.RingGeometry(SCORE_RADIUS - 0.05, SCORE_RADIUS, 32);

            const circleMat = new THREE.MeshBasicMaterial({
                color: 0xe74c3c, // Initial Red color
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.5
            });

            const spacing = 0.65;
            const rows = 4;
            const startZ = -22;

            for (let r = 0; r < rows; r++) {
                for (let i = 0; i <= r; i++) {
                    const x = (i - r * 0.5) * spacing;
                    const z = startZ - (r * spacing);

                    const circleMaterialInstance = circleMat.clone();
                    const circle = new THREE.Mesh(circleGeo, circleMaterialInstance);
                    circle.rotation.x = -Math.PI / 2;
                    circle.position.set(x, LANE_Y + 0.01, z);
                    scene.add(circle);
                    pinCircles.push(circle);

                    const loader = new THREE.TextureLoader();
                    const glowTexture = loader.load('https://threejs.org/examples/textures/sprites/glow.png');

                    const spriteMaterial = new THREE.SpriteMaterial({
                        map: glowTexture,
                        color: 0xe74c3c,
                        transparent: true,
                        opacity: 0.6,
                        blending: THREE.AdditiveBlending
                    });
                    const sprite = new THREE.Sprite(spriteMaterial);
                    sprite.position.copy(circle.position);
                    sprite.scale.set(0.5, 0.5, 1); // Adjust size to fit circle
                    scene.add(sprite);

                    const group = new THREE.Group();
                    const pMesh = new THREE.Mesh(pinGeo, pinMaterial);
                    pMesh.castShadow = true;

                    group.add(pMesh);

                    const stripe = new THREE.Mesh(stripeGeo, stripeMat);
                    stripe.position.set(0, 0.16, 0);
                    group.add(stripe);

                    scene.add(group);

                    const pBody = new CANNON.Body({
                        mass: 2.5,
                        material: pinMat
                    });

                    const qCyl = new CANNON.Quaternion();
                    qCyl.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);

                    pBody.addShape(new CANNON.Cylinder(0.12, 0.12, 0.1, 12), new CANNON.Vec3(0, -0.35, 0), qCyl);
                    pBody.addShape(new CANNON.Sphere(0.16), new CANNON.Vec3(0, -0.18, 0));
                    pBody.addShape(new CANNON.Cylinder(0.08, 0.13, 0.3, 12), new CANNON.Vec3(0, 0.05, 0), qCyl);
                    pBody.addShape(new CANNON.Sphere(0.09), new CANNON.Vec3(0, 0.31, 0));

                    pBody.linearDamping = 0.2;
                    pBody.angularDamping = 0.3;
                    pBody.type = CANNON.Body.KINEMATIC;
                    pBody.position.set(x, LANE_Y + (PIN_HEIGHT / 2), z);

                    pBody.addEventListener('collide', (e) => {
                        if (pBody.type === CANNON.Body.KINEMATIC) {
                            pBody.type = CANNON.Body.DYNAMIC;
                            pBody.updateMassProperties();

                            playGameSound('collision');

                            const forceDir = pBody.position.vsub(e.contact.bi.position);
                            forceDir.normalize();
                            pBody.applyImpulse(forceDir.scale(2), pBody.position);
                            pBody.velocity.y += 1.2;

                            spawnImpact(pBody.position, 0xffffff, 8);

                            // --- UPDATE THIS BLOCK ---
                            if (!impactOccurred) {
                                impactOccurred = true;
                                isCinematicMode = true;
                                timeScale = 0.15; // Set to 15% speed for dramatic effect
                                cinematicTargetPin = pBody; // Focus on the first pin hit

                                // Reset speed after 3 seconds of real-time
                                setTimeout(() => {
                                    timeScale = 1.0;
                                    isCinematicMode = false;
                                }, 3000);

                                clearTimeout(resetTimer);
                                resetTimer = setTimeout(checkPins, 3500);
                            }
                        }
                    });

                    world.addBody(pBody);
                    pins.push({ mesh: group, body: pBody, initialPos: { x: x, z: z } });
                }
            }

        }

        function initLightTrail() {
            const geometry = new THREE.PlaneGeometry(1, 1, 1, TRAIL_MAX_POINTS - 1);
            const material = new THREE.MeshBasicMaterial({
                color: 0x00ccff, transparent: true, opacity: 0.6, side: THREE.DoubleSide, blending: THREE.AdditiveBlending
            });
            trailMesh = new THREE.Mesh(geometry, material);
            trailMesh.frustumCulled = false;
            trailMesh.visible = false;
            scene.add(trailMesh);
        }

        function updateLightTrail() {
            if (!isBowling) {
                trailMesh.visible = false;
                trailHistory = [];
                return;
            }
            trailMesh.visible = true;
            trailHistory.push({ x: ballBody.position.x, y: ballBody.position.y, z: ballBody.position.z });

            if (trailHistory.length > TRAIL_MAX_POINTS) trailHistory.shift();
            const posAttr = trailMesh.geometry.attributes.position;
            const baseWidth = 0.12;
            for (let i = 0; i < TRAIL_MAX_POINTS; i++) {
                const pointIndex = Math.min(i, trailHistory.length - 1);
                const point = trailHistory[pointIndex] || { x: ballBody.position.x, y: ballBody.position.y, z: ballBody.position.z };
                const taper = (i / TRAIL_MAX_POINTS);
                const currentWidth = baseWidth * taper;
                const trailY = point.y - BALL_RADIUS + 0.02;
                posAttr.setXYZ(i * 2, point.x - currentWidth / 2, trailY, point.z);
                posAttr.setXYZ(i * 2 + 1, point.x + currentWidth / 2, trailY, point.z);
            }
            posAttr.needsUpdate = true;
        }

        function spawnImpact(pos, color, count, scale = 1.0) {
            for (let i = 0; i < count; i++) {
                // Use the scale parameter to make particles bigger for a strike
                const part = new THREE.Mesh(
                    new THREE.SphereGeometry(0.04 * scale, 4, 4),
                    new THREE.MeshBasicMaterial({ color: color, transparent: true })
                );
                part.position.set(pos.x, pos.y, pos.z);

                // Increase velocity for a bigger explosion
                const vx = (Math.random() - 0.5) * 0.3 * scale;
                const vy = Math.random() * 0.3 * scale;
                const vz = (Math.random() - 0.5) * 0.3 * scale;

                scene.add(part);
                impactParticles.push({ mesh: part, vel: new THREE.Vector3(vx, vy, vz), life: 1.0 });
            }
        }

        function updateImpacts() {
            for (let i = impactParticles.length - 1; i >= 0; i--) {
                const p = impactParticles[i];
                p.mesh.position.add(p.vel);
                p.vel.y -= 0.01; p.life -= 0.03;
                p.mesh.scale.setScalar(p.life);
                p.mesh.material.opacity = p.life;
                if (p.life <= 0) { scene.remove(p.mesh); impactParticles.splice(i, 1); }
            }
        }

        function onTouchStart(e) {
            if (isBowling) return;
            e.preventDefault();
            isTouching = true;
            document.getElementById('hint').style.opacity = '0';
            const t = (e.touches && e.touches[0]) || e;
            touchStartPos.x = t.clientX; touchStartPos.y = t.clientY;
            touchStartTime = Date.now();
            ballMesh.material.emissive.setHex(0x00ffff);
        }

        function onTouchMove(e) {
            if (isBowling || !isTouching) return;
            e.preventDefault();
            const t = (e.touches && e.touches[0]) || e;
            const deltaX = (t.clientX - touchStartPos.x) * 0.015;
            ballBody.position.x = Math.max(-1.5, Math.min(1.5, ballBody.position.x + deltaX));
            touchStartPos.x = t.clientX;
        }

        function onTouchEnd(e) {
            if (isBowling || !isTouching) return;
            e.preventDefault();
            isTouching = false;
            const t = (e.changedTouches && e.changedTouches[0]) || e;
            const deltaY = touchStartPos.y - t.clientY;
            const duration = Date.now() - touchStartTime;
            ballMesh.material.emissive.setHex(0x003366);

            if (deltaY > 20) {
                let speedScale = (deltaY / Math.max(duration, 5)) * 25;
                let forwardSpeed = Math.max(25, Math.min(speedScale, 65));
                randomHookForce = (Math.random() - 0.5) * 5;
                throwBall(forwardSpeed);
            } else {
                document.getElementById('hint').style.opacity = '1';
            }
        }

        function throwBall(speed) {
            isBowling = true;
            document.getElementById('hint').style.opacity = '0';
            ballBody.mass = 20;
            ballBody.type = CANNON.Body.DYNAMIC;
            ballBody.updateMassProperties();
            ballBody.velocity.set(0, 0, -speed * 0.9);
            ballBody.angularVelocity.set(speed * 0.8, randomHookForce * 2, (Math.random() - 0.5) * 15);
            resetTimer = setTimeout(checkPins, 4000);
            playGameSound('rolling');
        }

        function checkPins() {
            let fallen = 0;
            const SCORE_RADIUS = 0.22;

            // 1. Calculate how many pins have fallen
            pins.forEach((p, index) => {
                const dx = p.body.position.x - p.initialPos.x;
                const dz = p.body.position.z - p.initialPos.z;
                const distance = Math.sqrt(dx * dx + dz * dz);

                const up = new CANNON.Vec3(0, 1, 0);
                const pinUp = p.body.quaternion.vmult(up);
                const angle = Math.acos(up.dot(pinUp));

                // Logic for "Invalid" pin (Fallen or moved)
                if (distance > SCORE_RADIUS || angle > 0.78 || p.body.position.y < -0.5) {
                    fallen++;
                    // Turn circle GREEN if the pin is invalid
                    if (pinCircles[index]) pinCircles[index].material.color.setHex(0x2ecc71);
                } else {
                    // Keep circle RED if the pin is still valid
                    if (pinCircles[index]) pinCircles[index].material.color.setHex(0xe74c3c);
                }
            });

            playGameSound('stop_rolling');

            currentFallenPins = fallen;
            document.getElementById('score-text').innerText = `Pins: ${fallen}`;

            // 2. Handle Strike Special Effects
            if (fallen === 10) {
                // Physics Blast: Push all pins away from the center for impact
                pins.forEach(p => {
                    const blastForce = 15;
                    const direction = p.body.position.clone().vsub(new CANNON.Vec3(0, 0, -22));
                    direction.normalize();
                    p.body.applyImpulse(direction.scale(blastForce), p.body.position);
                });

                // Trigger UI Popup
                const strikePopup = document.getElementById('strike-popup');
                strikePopup.classList.add('show');
                setTimeout(() => strikePopup.classList.remove('show'), 2000);

                playGameSound('strike');

                // Massive Particle Blast (using the scale parameter)
                spawnImpact(new CANNON.Vec3(0, 1, -22), 0xf1c40f, 60, 4.0);

                // Screen Shake
                triggerScreenShake(0.5);
            }

            // 3. Show Result Message Box
            const msgBox = document.getElementById('msg-box');
            const title = document.getElementById('msg-title');
            const body = document.getElementById('msg-body');
            const btn = document.getElementById('action-btn');

            msgBox.style.display = 'block';

            if (matchHistory.length + 1 >= MAX_MATCHES) {
                title.innerText = "FINAL SCORE";
                let total = matchHistory.reduce((a, b) => a + b, 0) + fallen;
                body.innerText = `You hit ${fallen} pins this turn.\nTotal Score: ${total}`;
                btn.innerText = "RESTART GAME";
            } else {
                title.innerText = (fallen === 10) ? "STRIKE!" : "RESULT";
                body.innerText = `${fallen} pins cleared.`;
                btn.innerText = "NEXT FRAME";
            }
        }

        function handleMatchEnd() {
            if (matchHistory.length >= MAX_MATCHES) {
                fullReset();
            } else {
                recordAndReset();
            }
        }

        function recordAndReset() {
            let currentScore = currentFallenPins;
            const lastIndex = matchHistory.length - 1;

            if (currentFallenPins === 10) {
                // Count how many consecutive strikes before this round (including current)
                let consecutiveStrikes = 1;
                for (let i = lastIndex; i >= 0; i--) {
                    if (matchHistory[i] === 10) consecutiveStrikes++;
                    else break;
                }
                currentScore = 10 * consecutiveStrikes;
            }

            matchHistory.push(currentScore);
            updateScoreTable();
            resetGame();
        }



        function fullReset() {
            matchHistory = [];
            updateScoreTable();
            resetGame();
        }

        function updateScoreTable() {
            let total = 0;
            for (let i = 0; i < MAX_MATCHES; i++) {
                const cell = document.getElementById(`m${i}`);
                if (matchHistory[i] !== undefined) {
                    cell.innerText = matchHistory[i];
                    total += matchHistory[i];

                    // Check if this score is a multiple of 10 (a strike or doubled strike)
                    if (matchHistory[i] > 0 && matchHistory[i] % 10 === 0) {
                        const streakCount = matchHistory[i] / 10;
                        if (streakCount > 1) {
                            cell.style.color = "#e74c3c";  // red for streak strikes
                            cell.innerText = `${matchHistory[i]} (${streakCount}x)`;
                        } else {
                            cell.style.color = "#f1c40f"; // gold for normal strike
                            cell.innerText = `${matchHistory[i]}`;
                        }
                    } else {
                        cell.style.color = "white";  // normal color for other scores
                    }
                } else {
                    cell.innerText = "-";
                    cell.style.color = "white";
                }
            }
            document.getElementById('total-score').innerText = total;
        }



        function resetGame() {
            // 1. Reset Game State Flags
            isBowling = false;
            randomHookForce = 0;
            currentFallenPins = 0;
            impactOccurred = false;
            isCinematicMode = false;
            cinematicTargetPin = null;
            timeScale = 1.0;

            // 2. Reset Camera to Starting Position
            camera.position.set(0, 4, 12);
            camera.lookAt(0, 1, -5);

            // 3. Clear Timers and UI
            if (resetTimer) clearTimeout(resetTimer);
            resetTimer = null;

            document.getElementById('score-text').innerText = `Pins: 0`;
            document.getElementById('msg-box').style.display = 'none';
            document.getElementById('hint').style.opacity = '1';

            // 4. Reset Ball Physics & Visuals
            // We set to STATIC so it doesn't move while the user is positioning it
            ballBody.type = CANNON.Body.STATIC;
            ballBody.mass = 0;
            ballBody.updateMassProperties();

            // Wipe all latent forces and velocities
            ballBody.velocity.set(0, 0, 0);
            ballBody.angularVelocity.set(0, 0, 0);
            ballBody.force.set(0, 0, 0);
            ballBody.torque.set(0, 0, 0);

            // Set Starting Position (slightly above lane to prevent floor clipping)
            ballBody.position.set(0, LANE_Y + BALL_RADIUS + 0.05, 5);
            ballBody.quaternion.set(0, 0, 0, 1);

            // Immediate Visual Sync
            ballMesh.position.copy(ballBody.position);
            ballMesh.quaternion.copy(ballBody.quaternion);

            // 5. Reset FX
            trailHistory = [];
            if (trailMesh) trailMesh.visible = false;

            pinCircles.forEach(circle => {
                circle.material.color.setHex(0xe74c3c);
            });

            // 6. Reset All Pins to Initial Formation
            pins.forEach((p, index) => {
                const spacing = 0.65;
                const rows = 4;
                const startZ = -22;
                let count = 0;

                // Loop through the formation logic to find the original X/Z for this pin index
                for (let r = 0; r < rows; r++) {
                    for (let i = 0; i <= r; i++) {
                        if (count === index) {
                            const x = (i - r * 0.5) * spacing;
                            const z = startZ - (r * spacing);

                            // Reset Physics Body
                            p.body.type = CANNON.Body.KINEMATIC;
                            p.body.position.set(x, LANE_Y + (PIN_HEIGHT / 2) + 0.05, z);
                            p.body.velocity.set(0, 0, 0);
                            p.body.angularVelocity.set(0, 0, 0);
                            p.body.quaternion.set(0, 0, 0, 1);

                            // Immediate Mesh Sync
                            p.mesh.position.copy(p.body.position);
                            p.mesh.quaternion.copy(p.body.quaternion);
                        }
                        count++;
                    }
                }
            });

            playGameSound('stop_rolling');

            // 7. Re-enable Walls and Reset Circles
            if (leftWallMesh) leftWallMesh.visible = true;
            if (rightWallMesh) rightWallMesh.visible = true;

            pinCircles.forEach(circle => {
                circle.material.color.setHex(0xe74c3c); // Reset all to red
            });
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playGameSound(type) {
            // Ensure AudioContext is active (browsers block auto-play)
            if (THREE.AudioContext.getContext().state === 'suspended') {
                THREE.AudioContext.getContext().resume();
            }

            if (type === 'collision' && pinKnockSound && pinKnockSound.buffer) {
                if (pinKnockSound.isPlaying) pinKnockSound.stop();
                pinKnockSound.play();
            }

            if (type === 'rolling') {
                if (ballPathSound && ballPathSound.buffer && !ballPathSound.isPlaying) {
                    ballPathSound.play();
                }
            }

            if (type === 'stop_rolling') {
                if (ballPathSound && ballPathSound.isPlaying) {
                    ballPathSound.stop();
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            // 1. Step the Physics World
            // timeScale is 1.0 normally, 0.15 during cinematic slow-mo
            world.step(1 / 60 * timeScale);

            // 2. Sync Three.js Meshes with Cannon.js Physics Bodies
            if (ballMesh && ballBody) {
                ballMesh.position.copy(ballBody.position);
                ballMesh.quaternion.copy(ballBody.quaternion);

                pins.forEach(p => {
                    p.mesh.position.copy(p.body.position);
                    p.mesh.quaternion.copy(p.body.quaternion);
                });
            }

            // 7. Re-enable Walls
            //if (leftWallMesh) leftWallMesh.visible = true;
            //if (rightWallMesh) rightWallMesh.visible = true;

            // 3. Apply subtle hook/curve force while ball is in play
            if (isBowling && ballBody.position.z < 5) {
                ballBody.applyForce(new CANNON.Vec3(randomHookForce * 2.0, 0, 0), ballBody.position);
            }

            // 4. Camera State Machine
            if (isBowling) {
                if (isCinematicMode) {
                    if (leftWallMesh) leftWallMesh.visible = false;
                    if (rightWallMesh) rightWallMesh.visible = false;

                    const pinCenterZ = -20;

                    // 1. POSITION: Same as before, following the ball
                    const cameraOffset = new THREE.Vector3(3.5, 4.0, 4.0);
                    const targetPos = new THREE.Vector3(
                        ballBody.position.x + cameraOffset.x,
                        cameraOffset.y,
                        ballBody.position.z + cameraOffset.z
                    );
                    camera.position.lerp(targetPos, 0.1);

                    // 2. MODIFIED LOOKAT: Stop tracking midpoint after z < -15
                    // Once the ball passes -15, the "lookAt" stays locked on the pins (-20)
                    const effectiveBallZ = Math.max(ballBody.position.z, -25);
                    const lookAtPoint = new THREE.Vector3(
                        ballBody.position.x * 0.5,
                        0.8,
                        (effectiveBallZ + pinCenterZ) * 0.5
                    );

                    camera.lookAt(lookAtPoint);
                }
                else if (impactOccurred) {
                    // POST-IMPACT VIEW
                    if (leftWallMesh) leftWallMesh.visible = true;
                    if (rightWallMesh) rightWallMesh.visible = true;

                    const targetPos = new THREE.Vector3(0, 4, -14);
                    camera.position.lerp(targetPos, 0.05);
                    camera.lookAt(0, 1, -24);
                }
                else {
                    // BALL FOLLOW VIEW
                    if (leftWallMesh) leftWallMesh.visible = true;
                    if (rightWallMesh) rightWallMesh.visible = true;

                    const targetZ = Math.max(ballBody.position.z + 8, -12);
                    const targetX = Math.max(-3.0, Math.min(3.0, ballBody.position.x * 0.7));
                    camera.position.z += (targetZ - camera.position.z) * 0.08;
                    camera.position.x += (targetX - camera.position.x) * 0.08;
                    camera.lookAt(ballBody.position.x * 0.4, 1.2, ballBody.position.z - 6);
                }
            }

            if (shakeIntensity > 0) {
                camera.position.x += (Math.random() - 0.5) * shakeIntensity;
                camera.position.y += (Math.random() - 0.5) * shakeIntensity;
                shakeIntensity *= 0.9; // Decay the shake
            }

            // 5. Add pulsing effect on circles
            const pulseSpeed = 2;
            const pulseAmplitude = 0.15;
            const time = performance.now() / 1000;

            pinCircles.forEach(circle => {
                const scale = 1 + Math.sin(time * pulseSpeed) * pulseAmplitude;
                circle.scale.set(scale, scale, scale);
            });

            // 6. adding glowing effect
            const glowSpeed = 3;
            pinCircles.forEach(circle => {
                const glow = 0.4 + (Math.sin(performance.now() * 0.005 * glowSpeed) + 1) / 2 * 0.6; // oscillates 0.4 - 1.0
                circle.material.opacity = glow * 0.5 + 0.3; // vary opacity between 0.3 and ~0.8
            });

            // 7. Update FX & Render
            updateLightTrail();
            updateImpacts();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
